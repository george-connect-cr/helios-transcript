}
.kai-insight.show { display:block; }
.kai-insight-lbl {
  font-size:9px;font-weight:400;font-weight:400;letter-spacing:.01em;
  color:var(--t2);margin-bottom:3px;
  font-family:var(--f);display:flex;align-items:center;gap:4px;
}
.kai-insight-txt {
  font-size:11px;color:var(--t1);line-height:1.5;
  font-family:var(--f);font-weight:400;
}

/* Rec stack mejorado */
.rec-toast {
  border-radius:8px !important;
  padding:8px 10px !important;
  border:1px solid var(--gb2) !important;
}

/* ── Menú de perfil ── */
.n-profile-btn {
  display:flex;align-items:center;gap:8px;
  padding:4px 10px 4px 4px;
  border-radius:20px;border:1px solid var(--gb2);
  background:var(--c2);cursor:pointer;
  transition:background .15s, border-color .15s;
  flex-shrink:0;
}
.n-profile-btn:hover { background:var(--c3);border-color:var(--gb); }
.n-profile-av {
  width:24px;height:24px;border-radius:50%;
  background:var(--a);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;font-family:var(--f);
  flex-shrink:0;
}
.n-profile-name {
  font-size:12px;font-weight:600;color:var(--t0);
  font-family:var(--f);max-width:100px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.n-profile-chevron {
  font-size:9px;color:var(--t2);margin-left:2px;
  transition:transform .15s;
}

/* Dropdown */
.profile-menu {
  position:absolute;top:calc(100% + 8px);right:0;
  width:260px;
  background:var(--c1);
  border:1px solid var(--gb2);
  border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.12);
  z-index:500;overflow:hidden;
  display:none;
  animation:fi .15s ease;
}
.profile-menu.open { display:block; }

.pm-header {
  padding:14px 16px 12px;
  border-bottom:1px solid var(--gb2);
}
.pm-email {
  font-size:13px;font-weight:500;color:var(--t0);
  font-family:var(--f);margin-bottom:1px;
}
.pm-role {
  font-size:11px;font-weight:500;
  color:var(--t2);font-family:var(--f);
  text-transform:capitalize;
  margin-top:2px;
  display:block;
}

.pm-section { padding:6px 0; border-bottom:1px solid var(--gb2); }
.pm-section:last-child { border-bottom:none; }

.pm-item {
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;cursor:pointer;
  transition:background .1s;font-family:var(--f);
}
.pm-item:hover { background:var(--c2); }
.pm-item-ico {
  width:16px;text-align:center;flex-shrink:0;
  color:var(--t2);
}
.pm-item-txt {
  flex:1;font-size:13px;color:var(--t0);font-weight:400;
}
.pm-item.danger .pm-item-txt { color:var(--r);font-weight:400; }
.pm-item-badge {
  font-size:10px;color:var(--t2);font-family:var(--f);
}
.pm-item.danger .pm-item-txt { color:var(--r); }
.pm-item.danger:hover { background:rgba(232,64,64,.06); }

/* Toggle tema inline */
.pm-theme-row {
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;cursor:pointer;
  transition:background .1s;
}
.pm-theme-row:hover { background:var(--c2); }
.pm-theme-lbl {
  flex:1;font-size:13px;color:var(--t0);font-weight:500;font-family:var(--f);
}
.pm-theme-pill {
  position:relative;
  width:36px;height:20px;
  background:var(--c3);border-radius:10px;
  border:1px solid var(--gb2);flex-shrink:0;
  transition:background .25s;
}
body.dark .pm-theme-pill { background:#3b6ef8;border-color:#3b6ef8; }
.pm-theme-thumb {
  position:absolute;top:3px;left:3px;
  width:12px;height:12px;border-radius:50%;
  background:var(--t2);
  transition:transform .25s cubic-bezier(.4,0,.2,1), background .25s;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
body.dark .pm-theme-thumb { transform:translateX(16px);background:#fff; }

/* Wrap para posicionamiento relativo */
.n-profile-wrap { position:relative; }

/* ── Audio waveform ── */
.audio-wave {
  display:flex;align-items:center;gap:2px;height:16px;
}
.audio-wave .bar {
  width:2.5px;border-radius:2px;
  background:var(--t3);
  height:3px;
  transition:background .2s;
  transform-origin:center;
}
/* Estado idle — barras quietas en gris */
.audio-wave.idle .bar { background:var(--t3); animation:none; height:3px; }

/* Estado agente — barras animadas en azul */
.audio-wave.agent .bar { background:var(--blue); }
.audio-wave.agent .bar:nth-child(1){ animation:wv 1.1s ease-in-out -.5s infinite; }
.audio-wave.agent .bar:nth-child(2){ animation:wv 1.1s ease-in-out -.3s infinite; }
.audio-wave.agent .bar:nth-child(3){ animation:wv 1.1s ease-in-out -.1s infinite; }
.audio-wave.agent .bar:nth-child(4){ animation:wv 1.1s ease-in-out -.4s infinite; }
.audio-wave.agent .bar:nth-child(5){ animation:wv 1.1s ease-in-out -.2s infinite; }

/* Estado cliente — barras animadas en ámbar */
.audio-wave.client .bar { background:var(--y); }
.audio-wave.client .bar:nth-child(1){ animation:wv 0.9s ease-in-out -.4s infinite; }
.audio-wave.client .bar:nth-child(2){ animation:wv 0.9s ease-in-out -.2s infinite; }
.audio-wave.client .bar:nth-child(3){ animation:wv 0.9s ease-in-out  0s  infinite; }
.audio-wave.client .bar:nth-child(4){ animation:wv 0.9s ease-in-out -.3s infinite; }
.audio-wave.client .bar:nth-child(5){ animation:wv 0.9s ease-in-out -.1s infinite; }

@keyframes wv {
  0%,100%{ height:3px; opacity:.5; }
  50%{     height:14px; opacity:1; }
}

/* Confidence dots */
.conf-dots { display:flex;align-items:center;gap:3px; }
.conf-dot-item {
  width:6px;height:6px;border-radius:50%;
  background:var(--c3);transition:background .3s;
}
.conf-dots.hi .conf-dot-item { background:var(--g); }
.conf-dots.md .conf-dot-item:nth-child(-n+2) { background:var(--y); }
.conf-dots.lo .conf-dot-item:nth-child(1) { background:var(--r); }

/* Emoji de sentimiento con fill de color */
.sent-emo-wrap {
  position:relative;width:28px;height:28px;flex-shrink:0;
}
.sent-emo-base {
  position:absolute;inset:0;
  font-size:22px;line-height:28px;text-align:center;
  filter:grayscale(1);opacity:.4;
}
.sent-emo-color {
  position:absolute;inset:0;
  font-size:22px;line-height:28px;text-align:center;
  clip-path:inset(100% 0 0 0);
  transition:clip-path .8s cubic-bezier(.4,0,.2,1);
}
.sent-emo-wrap.fill-0  .sent-emo-color { clip-path:inset(100% 0 0 0); }
.sent-emo-wrap.fill-25 .sent-emo-color { clip-path:inset(75% 0 0 0); }
.sent-emo-wrap.fill-50 .sent-emo-color { clip-path:inset(50% 0 0 0); }
.sent-emo-wrap.fill-75 .sent-emo-color { clip-path:inset(25% 0 0 0); }
.sent-emo-wrap.fill-100 .sent-emo-color { clip-path:inset(0% 0 0 0); }

/* ══════════════════════════════════════════
   RESPONSIVE MOBILE — breakpoint 768px
   Estrategia: col-l arriba (PO), col-c centro (transcript),
   col-r abajo (KAI cards). Nav colapsa. Sin pérdida de funcionalidad.
   ══════════════════════════════════════════ */
/* ── Mobile tab bar ── */
.mob-tabbar{
  display:none; /* shown via media query */
  position:fixed;bottom:0;left:0;right:0;
  height:50px;z-index:200;
  background:var(--c1);
  border-top:1px solid var(--gb2);
  padding:0 4px;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.mob-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;cursor:pointer;
  color:var(--t3);font-family:var(--f);font-size:9px;
  padding:5px 4px;border-radius:5px;
  transition:color .15s,background .15s;
  -webkit-tap-highlight-color:transparent;
}
.mob-tab i{font-size:17px;transition:color .12s;}
.mob-tab.active{color:var(--a);}
.mob-tab.active i{color:var(--a);}
.mob-tab span{letter-spacing:.01em;}

/* ── Guía de llamada en col-r ── */
.guia-card{
  background:var(--c1);border-radius:10px;border:0.5px solid var(--gb2);
  display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;
}
.guia-head{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px 8px;flex-shrink:0;
}
/* Progress ring */
.guia-ring-wrap{position:relative;width:32px;height:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.guia-ring{position:absolute;top:0;left:0;}
.guia-ring-pct{font-family:var(--m);font-size:8px;font-weight:400;color:var(--t1);letter-spacing:-.02em;position:relative;z-index:1;}
/* Header text */
.guia-head-lbl{font-size:11px;font-weight:500;color:var(--t0);line-height:1.2;}
.guia-head-sub{font-size:9px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Counters */
.guia-counters{display:flex;gap:6px;flex-shrink:0;}
.guia-counter{display:flex;flex-direction:column;align-items:center;min-width:22px;}
.guia-counter span:first-child{font-family:var(--m);font-size:13px;font-weight:400;color:var(--r);line-height:1;letter-spacing:-.02em;}
.guia-counter.done span:first-child{color:var(--g);}
.guia-ctr-lbl{font-size:8px;color:var(--t3);margin-top:1px;}
/* Progress bar */
.guia-prog-bar{height:2px;background:var(--c3);flex-shrink:0;}
.guia-prog-fill{height:100%;background:var(--g);transition:width .4s ease,background .3s;border-radius:0 2px 2px 0;}
/* Body */
.guia-body{flex:1;overflow-y:auto;padding:5px 8px 6px;}
.guia-body::-webkit-scrollbar{width:3px;}
.guia-body::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px;}
/* Section label */
.guia-sec-lbl{
  font-size:8px;font-weight:500;color:var(--t3);
  letter-spacing:.05em;text-transform:uppercase;
  padding:6px 4px 3px;display:flex;justify-content:space-between;align-items:center;
}
.guia-sec-lbl em{font-style:normal;font-family:var(--m);font-size:9px;color:var(--t3);}
.guia-sec-lbl.done-lbl{color:rgba(82,166,118,.7);}
.guia-sec-lbl.done-lbl em{color:rgba(82,166,118,.5);}
/* Items */
@keyframes guiaItemIn{from{opacity:0;transform:translateX(-4px);}to{opacity:1;transform:translateX(0);}}
@keyframes guiaAutoFlash{0%{background:rgba(82,166,118,.18);}100%{background:transparent;}}
.g-item{
  display:flex;align-items:center;gap:7px;
  padding:5px 7px;margin-bottom:2px;
  border-radius:6px;cursor:pointer;
  transition:background .15s,opacity .25s;
}
.g-item.new-item{animation:guiaItemIn .25s ease forwards;}
.g-item:hover{background:var(--c2);}
.g-item.done{opacity:.55;}
.g-item.done:hover{opacity:.75;background:var(--c2);}
.g-item.done .g-txt{text-decoration:line-through;color:var(--t3);}
.g-item.auto-flash{animation:guiaAutoFlash .7s ease forwards;}
/* Checkbox */
.g-box{
  width:14px;height:14px;border-radius:3.5px;flex-shrink:0;
  border:1.5px solid var(--c3);background:transparent;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.g-box i{font-size:8px;color:transparent;transition:color .15s;}
.g-item:hover .g-box{border-color:var(--t2);}
.g-item.done .g-box{border-color:rgba(82,166,118,.5);background:rgba(82,166,118,.15);}
.g-item.done .g-box i{color:var(--g);}
/* Text */
.g-txt{font-size:10.5px;color:var(--t1);flex:1;line-height:1.35;font-family:var(--f);}
/* Tag */
.g-tag{font-size:7.5px;color:var(--t3);font-family:var(--f);flex-shrink:0;}
.g-tag.auto{color:var(--g);}
/* Skeleton */
.g-skel{display:flex;align-items:center;gap:7px;padding:5px 8px;margin-bottom:2px;border-radius:6px;opacity:.25;}
.g-skel-box{width:14px;height:14px;border-radius:3.5px;background:var(--c3);flex-shrink:0;}
.g-skel-line{height:7px;background:var(--c3);border-radius:4px;flex:1;animation:gSkelShim 1.8s ease-in-out infinite;}
@keyframes gSkelShim{0%,100%{opacity:.4;}50%{opacity:.8;}}
/* Empty / done states */
.guia-empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 12px;color:var(--t3);font-size:10px;text-align:center;gap:2px;
  font-family:var(--f);line-height:1.5;
}
.guia-done-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 12px;text-align:center;gap:2px;
}
/* Active card — one item at a time */
@keyframes guiaCardIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.guia-active-card{
  background:var(--c2);border-radius:8px;
  border:1px solid var(--gb2);
  padding:10px 11px;margin-bottom:8px;
  animation:guiaCardIn .25s ease forwards;
}
.guia-active-top{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;
}
.guia-active-step{font-size:9px;color:var(--t3);font-family:var(--m);}
.guia-active-tag{font-size:8px;color:var(--g);font-weight:500;letter-spacing:.02em;}
.guia-active-txt{
  font-size:11.5px;color:var(--t0);line-height:1.45;
  font-family:var(--f);margin-bottom:10px;
}
.guia-active-actions{display:flex;gap:6px;}
.guia-btn-done{
  flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:6px 10px;border-radius:6px;border:none;cursor:pointer;
  background:rgba(82,166,118,.12);color:var(--g);
  font-family:var(--f);font-size:11px;font-weight:500;
  transition:background .15s;
}
.guia-btn-done:hover{background:rgba(82,166,118,.22);}
.guia-btn-skip{
  display:flex;align-items:center;gap:4px;
  padding:6px 9px;border-radius:6px;border:none;cursor:pointer;
  background:transparent;color:var(--t3);
  font-family:var(--f);font-size:11px;
  transition:color .15s,background .15s;
}
.guia-btn-skip:hover{color:var(--t1);background:var(--c3);}
/* Pending queue */
.guia-pending-label{
  font-size:8px;font-weight:500;color:var(--t3);letter-spacing:.05em;
  text-transform:uppercase;padding:8px 4px 3px;
}
.guia-queue-item{
  display:flex;align-items:center;gap:6px;
  padding:3px 4px;border-radius:4px;opacity:.5;
  transition:opacity .15s;
}
.guia-queue-item:hover{opacity:.8;}
.guia-queue-txt{font-size:9.5px;color:var(--t2);font-family:var(--f);line-height:1.3;}
/* History auto badge */
.guia-hist-auto{font-size:7.5px;color:var(--g);margin-left:4px;}
@keyframes guiaHistIn{from{opacity:0;transform:translateX(-3px);}to{opacity:.7;transform:translateX(0);}}
.guia-hist-item{
  display:flex;align-items:center;gap:6px;
  padding:4px 6px;border-radius:5px;
  opacity:.65;animation:guiaHistIn .2s ease forwards;
}
.guia-hist-item:hover{opacity:1;background:var(--c2);}
.guia-hist-ico{color:var(--g);flex-shrink:0;}
.guia-hist-txt{font-size:10px;color:var(--t2);font-family:var(--f);flex:1;text-decoration:line-through;}

/* KAI float en col-c sobre el agent-strip */
.kai-float-wrap{
  flex-shrink:0;padding:0 12px 10px;
}
.kai-float{
  background:var(--c1);border-radius:10px;
  border:1.5px solid rgba(234,179,8,.18);
  padding:9px 12px;
  display:flex;align-items:flex-start;gap:8px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  animation:kaiFP 3.5s ease-in-out infinite;
  display:none;
}
.kai-float.show{display:flex;}
@keyframes kaiFP{
  0%,100%{border-color:rgba(234,179,8,.18);box-shadow:0 2px 12px rgba(0,0,0,.05);}
  50%{border-color:rgba(234,179,8,.65);box-shadow:0 2px 16px rgba(234,179,8,.1);}
}
.kai-float-ico{font-size:13px;color:var(--t3);margin-top:1px;flex-shrink:0;}
.kai-float-txt{font-size:10.5px;color:var(--t1);line-height:1.45;flex:1;font-family:var(--f);}

/* ctx-scroll como flex para que guia-card ocupe espacio restante */
.ctx-scroll{display:flex;flex-direction:column;gap:8px;flex:1;overflow-y:auto;padding:10px 10px;min-height:0;}
.ctx-scroll::-webkit-scrollbar{width:0;}


/* Agent mini en col-r */
.agent-mini{display:flex;align-items:center;gap:10px;padding:9px 13px;}
.ag-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#5b8bff);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600;flex-shrink:0;}
.ag-timer{font-size:14px;font-weight:600;color:var(--t0);font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1;}
.ag-timer-lbl{font-size:8.5px;color:var(--t2);margin-top:1px;}
.ag-kpis{display:flex;gap:10px;margin-left:auto;}
.ag-kpi{text-align:right;}
.ag-kv{font-size:12px;font-weight:600;color:var(--t0);line-height:1;}
.ag-kv.g{color:var(--g);}
.ag-kv.y{color:var(--y);}
.ag-kl{font-size:8px;color:var(--t2);margin-top:1px;}


/* Sent icon con pulso de color dinámico */
.sent-ico-new{
  position:relative;width:32px;height:32px;border-radius:8px;
  background:var(--c2);border:0.5px solid var(--gb2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  animation:sentGlow 2s ease-in-out infinite;
  transition:border-color .4s;
}
/* Cara sentimiento — hijos reales, sin pseudo-elementos */
.sent-face{
  width:18px;height:18px;border-radius:50%;
  border:1.8px solid #8a8a85;
  position:relative;flex-shrink:0;
  transition:border-color .4s;
}
.sf-eyes{
  position:absolute;top:4px;left:3px;
  width:2.5px;height:2.5px;border-radius:50%;
  background:#8a8a85;
  box-shadow:5px 0 0 #8a8a85;
  transition:background .4s,box-shadow .4s;
}
/* Boca neutral */
.sf-mouth{
  position:absolute;bottom:3.5px;left:50%;
  transform:translateX(-50%);
  width:7px;height:1.8px;
  background:#8a8a85;border-radius:2px;
  transition:all .3s;
}
.sent-face.happy .sf-mouth{
  height:0;width:8px;
  border:1.8px solid #8a8a85;border-top:none;
  border-radius:0 0 6px 6px;
  background:transparent;bottom:3px;
}
.sent-face.sad .sf-mouth{
  height:0;width:8px;
  border:1.8px solid #8a8a85;border-bottom:none;
  border-radius:6px 6px 0 0;
  background:transparent;bottom:4px;
}
/* Punto de pulso interior — esquina inferior derecha, no recortado */
.sent-pulse-dot{
  position:absolute;bottom:2px;right:2px;
  width:6px;height:6px;border-radius:50%;
  background:var(--y);
  animation:sentDotPulse 2s ease-in-out infinite;
  transition:background .4s;
  border:1px solid var(--c1);
}
@keyframes sentDotPulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.2;transform:scale(.5);}
}
@keyframes sentGlow{
  0%,100%{box-shadow:0 0 0 0 transparent;}
  50%{box-shadow:0 0 0 3px rgba(232,160,32,.18);}
}


/* ══ MOBILE — KAI Academy dark UI ══════════════════════════ */
:root {
  --mb:   #212121;
  --mb1:  #2a2a2a;
  --mb2:  #333333;
  --mbt0: #f5f5f5;
  --mbt1: #a3a3a3;
  --mbt2: #555555;
  --mbg:  #22c55e;
  --mbr:  #ef4444;
}

#mob-home, #mob-incoming, #mob-active {
  display: none;
  position: fixed; inset: 0;
  background: var(--mb) !important;
  flex-direction: column;
  z-index: 500;
  font-family: var(--f);
  -webkit-font-smoothing: antialiased;
  color: var(--mbt0);
}
@media (max-width: 768px) {
  #mob-home.visible    { display: flex; }
  #mob-incoming.visible{ display: flex; }
  #mob-active.visible  { display: flex; }
}

/* ── HOME ───────────────────────────────────────────────────── */
#mob-home {
  padding: env(safe-area-inset-top, 52px) 28px env(safe-area-inset-bottom, 40px);
  justify-content: space-between;
  align-items: stretch;
}
.mob-home-top {
  display: flex; flex-direction: column; gap: 4px;
}
.mob-home-logo {
  height: 26px; border-radius: 4px;
  opacity: .95; align-self: flex-start;
}
.mob-home-title {
  font-size: 10px; font-weight: 400; color: var(--mbt2);
  letter-spacing: .12em; text-transform: uppercase;
  margin-top: 6px;
}
.mob-home-mid {
  display: flex; flex-direction: column; gap: 4px;
}
.mob-home-greeting {
  font-size: 30px; font-weight: 300; color: var(--mbt0);
  letter-spacing: -.5px; line-height: 1.2;
}
.mob-home-role {
  font-size: 11px; color: var(--mbt2); letter-spacing: .03em;
}
.mob-home-actions {
  display: flex; flex-direction: column; gap: 10px;
}
.mob-home-btn {
  height: 50px; border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--f); font-size: 14px; font-weight: 500;
  border: none; transition: opacity .12s, transform .1s;
  -webkit-tap-highlight-color: transparent; letter-spacing: -.1px;
}
.mob-home-btn:active { opacity: .75; transform: scale(.98); }
.mob-home-btn.primary  { background: var(--mbt0) !important; color: #111 !important; }
.mob-home-btn.secondary {
  background: transparent !important; color: var(--mbt1) !important;
  border: 1px solid var(--mb2) !important;
  gap: 7px;
}
.mob-home-footer { display: flex; justify-content: center; }
.mob-home-version { display: none; }
.mob-home-logout {
  font-size: 11px; color: var(--mbt2); background: none; border: none;
  cursor: pointer; padding: 6px 16px; letter-spacing: .02em;
  font-family: var(--f);
}
.mob-home-logout:active { color: var(--mbr); }

/* ── LLAMADA ENTRANTE ────────────────────────────────────────── */
#mob-incoming {
  padding: env(safe-area-inset-top, 60px) 28px env(safe-area-inset-bottom, 48px);
  align-items: stretch; justify-content: space-between;
}
.mob-inc-top { display: flex; flex-direction: column; gap: 3px; }
.mob-inc-label {
  font-size: 10px; color: var(--mbt2);
  letter-spacing: .1em; text-transform: uppercase;
}
.mob-inc-name {
  font-size: 28px; font-weight: 300; color: var(--mbt0);
  letter-spacing: -.5px; line-height: 1.2;
}
.mob-inc-sub { font-size: 11px; color: var(--mbt2); }

.mob-inc-divider { height: 1px; background: var(--mb2); }

.mob-inc-wave-wrap {
  display: flex; align-items: center; justify-content: center;
  flex: 1;
}
.mob-inc-wave {
  display: flex; align-items: center; gap: 4px; height: 48px;
}
.mob-inc-wave span {
  width: 2.5px; border-radius: 2px; background: var(--mb2);
  animation: mob-inc-wv 1.6s ease-in-out infinite;
}
.mob-inc-wave span:nth-child(1){height:5px; animation-delay:0s;}
.mob-inc-wave span:nth-child(2){height:12px;animation-delay:.1s;}
.mob-inc-wave span:nth-child(3){height:22px;animation-delay:.2s;}
.mob-inc-wave span:nth-child(4){height:32px;animation-delay:.3s;}
.mob-inc-wave span:nth-child(5){height:42px;animation-delay:.4s;}
.mob-inc-wave span:nth-child(6){height:32px;animation-delay:.5s;}
.mob-inc-wave span:nth-child(7){height:22px;animation-delay:.6s;}
.mob-inc-wave span:nth-child(8){height:12px;animation-delay:.7s;}
.mob-inc-wave span:nth-child(9){height:5px; animation-delay:.8s;}
@keyframes mob-inc-wv {
  0%,100%{ transform:scaleY(.3); opacity:.3; }
  50%    { transform:scaleY(1);  opacity:.7; }
}

/* Botones clásicos de teléfono */
.mob-inc-actions {
  display: flex; justify-content: space-around; align-items: center;
}
.mob-inc-action {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  background: none; border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.mob-inc-circle {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: #fff;
  transition: transform .1s, opacity .1s;
}
.mob-inc-circle:active { transform: scale(.88); opacity: .8; }
.mob-inc-circle.decline { background: var(--mbr); }
.mob-inc-circle.answer  { background: var(--mbg); }
.mob-inc-lbl { font-size: 11px; color: var(--mbt2); }

/* ── LLAMADA ACTIVA ──────────────────────────────────────────── */
#mob-active {
  padding: env(safe-area-inset-top, 60px) 28px env(safe-area-inset-bottom, 48px);
  align-items: stretch; justify-content: space-between;
}
.mob-act-top { display: flex; flex-direction: column; gap: 2px; }
.mob-act-status {
  font-size: 10px; color: var(--mbg);
  letter-spacing: .1em; text-transform: uppercase;
}
.mob-act-timer {
  font-size: 44px; font-weight: 200; color: var(--mbt0);
  font-family: var(--m); letter-spacing: 2px; line-height: 1;
}
.mob-act-name { font-size: 11px; color: var(--mbt2); margin-top: 3px; }

.mob-act-wave-wrap {
  display: flex; align-items: center; justify-content: center; flex: 1;
}
.mob-act-wave {
  display: flex; align-items: center; gap: 4px; height: 56px;
}
.mob-act-wave span {
  width: 2.5px; border-radius: 2px;
  background: var(--mb2);
  animation: mob-act-wv 1.4s ease-in-out infinite;
}
.mob-act-wave span:nth-child(1){height:5px; animation-delay:0s;}
.mob-act-wave span:nth-child(2){height:14px;animation-delay:.12s;}
.mob-act-wave span:nth-child(3){height:28px;animation-delay:.24s;}
.mob-act-wave span:nth-child(4){height:44px;animation-delay:.36s;}
.mob-act-wave span:nth-child(5){height:56px;animation-delay:.48s;}
.mob-act-wave span:nth-child(6){height:44px;animation-delay:.60s;}
.mob-act-wave span:nth-child(7){height:28px;animation-delay:.72s;}
.mob-act-wave span:nth-child(8){height:14px;animation-delay:.84s;}
.mob-act-wave span:nth-child(9){height:5px; animation-delay:.96s;}
@keyframes mob-act-wv {
  0%,100%{ transform:scaleY(.2); opacity:.2; }
  50%    { transform:scaleY(1);  opacity:.9; }
}
.mob-act-wave.agent span  { background: #3b82f6; }
.mob-act-wave.client span { background: #f59e0b; }

.mob-act-controls {
  display: flex; align-items: center;
  justify-content: space-around;
}
.mob-ctrl-btn {
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  background: none; border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.mob-ctrl-circle {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--mbt1);
  border: 1px solid var(--mb2);
  transition: all .12s;
}
.mob-ctrl-circle:active { transform: scale(.9); }
.mob-ctrl-circle.active { background: var(--mbt0); color: #111; border-color: var(--mbt0); }
.mob-ctrl-lbl { font-size: 10px; color: var(--mbt2); letter-spacing: .02em; }

.mob-act-end {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--mbr); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: #fff;
  transition: transform .1s, opacity .1s;
  -webkit-tap-highlight-color: transparent;
}
.mob-act-end:active { transform: scale(.88); opacity: .8; }
.mob-act-end-lbl { font-size: 10px; color: var(--mbt2); letter-spacing: .02em; }
<!-- ══ MOBILE HOME ══════════════════════════════════════════ -->
<div id="mob-home">
  <div class="mob-home-top">
    <img src="assets/connect-logo.png" alt="Connect" class="mob-home-logo"/>
    <div class="mob-home-title">KAI Academy</div>
  </div>
  <div class="mob-home-mid">
    <div class="mob-home-greeting" id="mob-greeting">Hola</div>
    <div class="mob-home-role" id="mob-role">Agente</div>
  </div>
  <div class="mob-home-actions">
    <button class="mob-home-btn primary" onclick="mobStartPractica()">
      Iniciar práctica
    </button>
    <button class="mob-home-btn secondary" onclick="showWizard()">
      <i class="ti ti-help-circle" style="font-size:16px;" aria-hidden="true"></i>
      Ayuda
    </button>
  </div>
  <div class="mob-home-footer">
    <button class="mob-home-logout" onclick="AUTH.logout()">Cerrar sesión</button>
  </div>
</div>

<!-- ══ MOBILE LLAMADA ENTRANTE ══════════════════════════════ -->
<div id="mob-incoming">
  <div class="mob-inc-top">
    <div class="mob-inc-label">Llamada entrante</div>
    <div class="mob-inc-name">Cola: Connect</div>
    <div class="mob-inc-sub">Asistencia vial</div>
  </div>
  <div class="mob-inc-divider"></div>
  <div class="mob-inc-wave-wrap">
    <div class="mob-inc-wave">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </div>
  <div class="mob-inc-divider"></div>
  <div class="mob-inc-actions">
    <button class="mob-inc-action" onclick="mobDecline()">
      <div class="mob-inc-circle decline"><i class="ti ti-phone-off" aria-hidden="true"></i></div>
      <span class="mob-inc-lbl">Rechazar</span>
    </button>
    <button class="mob-inc-action" onclick="mobAnswer()">
      <div class="mob-inc-circle answer"><i class="ti ti-phone" aria-hidden="true"></i></div>
      <span class="mob-inc-lbl">Contestar</span>
    </button>
  </div>
</div>

<!-- ══ MOBILE LLAMADA ACTIVA ════════════════════════════════ -->
<div id="mob-active">
  <div class="mob-act-top">
    <div class="mob-act-status" id="mob-act-status">Conectando</div>
    <div class="mob-act-timer" id="mob-timer">0:00</div>
    <div class="mob-act-name">Cola: Connect</div>
  </div>
  <div class="mob-act-wave-wrap">
    <div class="mob-act-wave" id="mob-wave">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </div>
  <div class="mob-act-controls">
    <button class="mob-ctrl-btn" onclick="mobToggleMute()" id="mob-mute-btn">
      <div class="mob-ctrl-circle" id="mob-mute-circle">
        <i class="ti ti-microphone" id="mob-mute-ico" aria-hidden="true"></i>
      </div>
      <span class="mob-ctrl-lbl" id="mob-mute-lbl">Silenciar</span>
    </button>
    <div style="display:flex;flex-direction:column;align-items:center;gap:7px;">
      <button class="mob-act-end" onclick="mobEndCall()">
        <i class="ti ti-phone-off" aria-hidden="true"></i>
      </button>
      <div class="mob-act-end-lbl">Finalizar</div>
    </div>
    <button class="mob-ctrl-btn" onclick="mobToggleSpeaker()" id="mob-spk-btn">
      <div class="mob-ctrl-circle" id="mob-spk-circle">
        <i class="ti ti-volume" id="mob-spk-ico" aria-hidden="true"></i>
      </div>
      <span class="mob-ctrl-lbl" id="mob-spk-lbl">Altavoz</span>
    </button>
  </div>
</div>

<style>
/* ═══ DS v6 TOKENS ═══════════════════════════════════ */
:root{
  --bg:#f5f5f4; --c1:#ffffff; --c2:#f5f5f4; --c3:#e8e8e6; --c4:#d8d8d5;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --sh-sm:0 1px 3px rgba(0,0,0,.05);
  --gb:rgba(0,0,0,.10); --gb2:rgba(0,0,0,.08);
  --t0:#111110; --t1:#44443f; --t2:#8a8a85; --t3:#c4c4c0;
  --a:#e04500; --a2:#ff6535;
  --g:#52a676; --y:#e8a020; --r:#d86060; --v:#7048e8;
  --blue:#3b6ef8; --bl2:#eff3ff; --bl3:rgba(59,110,248,.1);
  --gr2:#edfaf4; --gr3:rgba(14,168,116,.12);
  --re2:#fff3f3; --re3:rgba(232,64,64,.12);
  --am2:#fff8ed; --am3:rgba(240,144,10,.14);
  --pu2:#f3f0ff; --pu3:rgba(112,72,232,.12);
  --f:'Geist',system-ui,sans-serif;
  --ic:var(--t2);   /* color único iconos */
  --m:'JetBrains Mono',monospace;
}

/* Dark theme — flips tokens; surfaces with hardcoded rgba overridden below */
body.dark{
  --bg:#1a1a1a; --c1:#212121; --c2:#2a2a2a; --c3:#333333; --c4:#3d3d3d;
  --sh:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.25);
  --sh-sm:0 1px 3px rgba(0,0,0,.35);
  --t0:#ececec; --t1:#b0b0b0; --t2:#717171; --t3:#4a4a4a;
  --gb:#404040; --gb2:#333333;
  --bl2:#1e2535; --gr2:#1a2e22; --re2:#2e1a1a; --am2:#2e2310; --pu2:#221a30;
}
body.dark nav{background:rgba(26,26,26,.92);}
body.dark .tp-hd{background:rgba(26,26,26,.6);}
body.dark .bubble.ag{background:rgba(59,110,248,.12);box-shadow:0 1px 2px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.2);border-left:2.5px solid rgba(59,110,248,.5);}
body.dark .bubble.ag:hover{background:rgba(59,110,248,.18);}
body.dark .bubble.cl{background:rgba(240,144,10,.1);border-right:2.5px solid rgba(240,144,10,.4);}
body.dark .bubble.cl:hover{background:rgba(240,144,10,.15);}
body.dark .typing-bubble{background:rgba(255,255,255,.06);box-shadow:0 1px 2px rgba(0,0,0,.3);}
body.dark .t-scroll-arrow{background:rgba(26,26,26,.95);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.3);}

body.dark .ps.tint-bl{background:#232323;}
body.dark .ps.tint-gr{background:#1e2a20;}
body.dark .ps.tint-bl .fld,body.dark .ps.tint-gr .fld{background:rgba(255,255,255,.04);}
body.dark .ps.tint-bl .fld:hover,body.dark .ps.tint-gr .fld:hover{background:rgba(255,255,255,.08);}
body.dark .fld:focus-within{background:var(--c2);box-shadow:0 0 0 2px rgba(59,110,248,.35);}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--f);background:var(--bg);color:var(--t0);-webkit-font-smoothing:antialiased;overflow:hidden;}
body{display:flex;flex-direction:column;font-size:13px;}
button{font-family:inherit;}
input,textarea,select{font-family:inherit;}

/* ═══ NAV ════════════════════════════════════════════ */
/* ═══ NAV (ported from app.html, DS v6 light) ═══════ */
nav{
  height:50px;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:0 16px;
  background:var(--c1);
  border-bottom:1px solid var(--gb2);
  position:relative;z-index:20;
}

/* Brand */
.n-brand{
  display:flex;align-items:center;gap:0;
  margin-right:20px;flex-shrink:0;line-height:1;white-space:nowrap;
}



/* Connection status */
.n-conn{ display:none; }
.cdot{width:6px;height:6px;border-radius:50%;background:var(--t3);}
.cdot.live{background:var(--g);animation:gp 2s infinite;}
.cdot.warn{background:var(--y);}
.cdot.err{background:var(--r);}
@keyframes gp{0%,100%{box-shadow:0 0 0 0 rgba(14,168,116,.35);}50%{box-shadow:0 0 0 5px rgba(14,168,116,0);}}

/* Preview-only badge */
.n-preview{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:20px;
  background:var(--pu2);color:var(--v);
  font-family:var(--f);font-size:8.5px;font-weight:700;
  letter-spacing:.1px;
}

/* Right controls */
.n-r{margin-left:auto;display:flex;align-items:center;gap:8px;}

.po-counter{
  display:none;align-items:center;gap:5px;
  background:var(--c2);box-shadow:var(--sh-sm);
  border-radius:20px;padding:6px 14px;cursor:pointer;
  font-family:var(--f);font-size:12px;font-weight:700;color:var(--t1);
  transition:background .15s;
}
.po-counter.show{display:flex;}
.po-counter:hover{background:var(--c3);}
.po-counter-lbl{font-size:9px;opacity:.6;font-weight:500;}

/* Theme toggle group */
/* Theme toggle */
.n-th {
  position:relative;
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;
  background:var(--c2);
  border-radius:8px;
  border:1px solid var(--gb2);
  cursor:pointer;
  flex-shrink:0;
  transition:background .2s, border-color .2s;
  user-select:none;
}
.n-th:hover { background:var(--c3); }
.n-th-lbl {
  font-family:var(--f);font-size:11px;font-weight:600;
  color:var(--t1);white-space:nowrap;
  transition:color .2s;
  min-width:32px;
}
.n-th-pill {
  position:relative;
  width:34px;height:18px;
  background:var(--c3);
  border-radius:9px;
  border:1px solid var(--gb2);
  flex-shrink:0;
  transition:background .25s;
}
body.dark .n-th-pill { background:#3b6ef8; border-color:#3b6ef8; }
.n-th-thumb {
  position:absolute;
  top:2px;left:2px;
  width:12px;height:12px;
  border-radius:50%;
  background:var(--t2);
  transition:transform .25s cubic-bezier(.4,0,.2,1), background .25s;
}
body.dark .n-th-thumb {
  transform:translateX(16px);
  background:#fff;
}

/* Dashboard button */
.n-dash{
  width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--gb2);background:transparent;
  border-radius:6px;color:var(--t2);
  cursor:pointer;font-size:14px;
  transition:background .12s,color .12s;
}
.n-dash:hover{background:var(--c2);color:var(--t0);}

/* Queue button */
.qbtn{
  height:30px;padding:0 12px;
  border:1px solid var(--gb2);background:transparent;
  border-radius:6px;
  font-family:var(--f);font-size:12px;font-weight:400;color:var(--t1);
  cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:background .12s;
}
.qbtn:hover{background:var(--c2);}
.qbtn .qn{
  color:var(--a);font-weight:600;
  font-family:var(--f);font-size:12px;
}

/* Demo button */
.n-demo{
  height:30px;padding:0 14px;
  border:1px solid var(--gb2);background:transparent;
  border-radius:6px;
  font-family:var(--f);font-size:12px;font-weight:400;color:var(--t0);
  cursor:pointer;transition:background .12s;
}
.n-demo:hover{background:var(--c2);}

/* Status (agent state) */
#status-wrap{position:relative;}
#status-wrap > button{
  display:flex;align-items:center;gap:6px;
  height:30px;padding:0 12px;
  border:1px solid var(--gb2);background:transparent;
  border-radius:6px;
  font-family:var(--f);font-size:12px;font-weight:400;
  color:var(--t0);cursor:pointer;white-space:nowrap;
  transition:background .12s;
}
#status-wrap > button:hover{background:var(--c2);}
#status-label {
  font-size:12px;font-weight:400;
  color:var(--t0);font-family:var(--f);
  display:inline !important;
  white-space:nowrap;
}
#status-dot-btn{
  width:6px;height:6px;border-radius:50%;
  background:var(--g);flex-shrink:0;transition:background .3s;
}
#status-menu{
  position:absolute;top:calc(100% + 8px);right:0;
  background:var(--c1);box-shadow:var(--sh);
  border-radius:8px;padding:6px;
  min-width:190px;max-height:360px;overflow-y:auto;
  z-index:21;display:none;
}
#status-menu.open{display:block;}
.status-opt{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:6px;
  font-family:var(--f);font-size:11.5px;color:var(--t1);
  cursor:pointer;transition:background .12s;
}
.status-opt:hover{background:var(--c2);color:var(--t0);}
.status-opt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* Logout */
#btn-logout{
  width:34px;height:34px;
  border:none;background:var(--c2);box-shadow:var(--sh-sm);
  border-radius:8px;color:var(--t2);
  cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
#btn-logout:hover{background:var(--re2);color:var(--r);}

/* Queue dropdown (Cola) */
.q-wrap{position:relative;}
.q-menu{
  position:absolute;top:calc(100% + 8px);right:0;
  background:var(--c1);box-shadow:var(--sh);
  border-radius:8px;padding:8px;min-width:300px;
  z-index:21;display:none;
}
.q-menu.open{display:block;}
.q-menu-hd{
  display:flex;align-items:center;gap:8px;
  padding:4px 8px 8px;
  font-family:var(--f);font-size:9px;font-weight:700;
  color:var(--t2);letter-spacing:.1px;
}
.q-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:6px;
  cursor:pointer;transition:background .12s;
}
.q-item:hover{background:var(--c2);}
.q-item-av{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:var(--c3);
  font-family:var(--f);font-size:10px;font-weight:700;color:var(--t1);
  display:flex;align-items:center;justify-content:center;
}
.q-item-body{flex:1;min-width:0;}
.q-item-nm{font-size:12px;font-weight:500;color:var(--t0);}
.q-item-meta{font-family:var(--f);font-size:9px;color:var(--t2);margin-top:1px;}
.q-item-wait{
  font-family:var(--f);font-size:10px;font-weight:700;color:var(--y);
  padding:3px 8px;border-radius:20px;background:var(--am2);
}
.q-item-wait.urgent{color:var(--r);background:var(--re2);}

/* PO Drawer */
#po-drawer-ov{
  position:fixed;inset:0;background:rgba(13,16,24,.42);
  backdrop-filter:blur(6px);z-index:250;display:none;
}
#po-drawer-ov.show{display:block;}
#po-drawer{
  position:fixed;top:0;right:0;bottom:0;width:380px;
  background:var(--c1);box-shadow:-12px 0 40px rgba(0,0,0,.18);
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;z-index:251;
}
#po-drawer-ov.show #po-drawer{transform:translateX(0);}
.pdh{
  height:52px;padding:0 18px;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  box-shadow:var(--sh-sm);
}
.pdh-title{font-family:var(--f);font-size:11px;font-weight:500;color:var(--t0);flex:1;}
.pdh-count{
  font-family:var(--f);font-size:9.5px;font-weight:600;color:var(--t2);
  padding:3px 9px;border-radius:20px;background:var(--c2);
}
.pdh-close{
  width:28px;height:28px;border-radius:8px;border:none;
  background:var(--c2);color:var(--t2);cursor:pointer;
  font-size:11px;display:flex;align-items:center;justify-content:center;
  transition:background .12s;
}
.pdh-close:hover{background:var(--c3);color:var(--t0);}
.pd-list{flex:1;overflow-y:auto;padding:20px;}
.pd-empty{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:60px 24px;text-align:center;
}
.pd-empty-o{font-size:42px;opacity:.18;}
.pd-empty-t{
  font-family:var(--f);font-size:11px;font-weight:700;
  color:var(--t1);letter-spacing:.1px;
}
.pd-empty-h{font-size:12px;color:var(--t2);max-width:240px;line-height:1.5;}

/* Dashboard overlay (inline · functional in preview) */
.dash-ov{
  position:fixed;inset:0;background:rgba(13,16,24,.5);
  backdrop-filter:blur(8px);z-index:300;
  display:none;align-items:center;justify-content:center;
  padding:24px;
}
.dash-ov.show{display:flex;}
.dash-modal{
  width:min(100%,920px);max-height:90vh;
  background:var(--c1);border-radius:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.1),0 24px 80px rgba(0,0,0,.28);
  display:flex;flex-direction:column;overflow:hidden;
  animation:dashIn .28s cubic-bezier(.34,1.56,.64,1);
}
@keyframes dashIn{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.dash-head{
  display:flex;align-items:center;gap:12px;
  padding:16px 22px;flex-shrink:0;
  box-shadow:var(--sh-sm);
}
.dash-head-ico{
  width:32px;height:32px;border-radius:8px;
  background:var(--c2);color:var(--t1);
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.dash-head-title{font-family:var(--f);font-size:14px;font-weight:500;color:var(--t0);line-height:1.2;}
.dash-head-sub{font-family:var(--f);font-size:10px;color:var(--t2);margin-top:2px;}
.dash-head-close{
  width:30px;height:30px;border-radius:8px;border:none;
  background:var(--c2);color:var(--t2);cursor:pointer;
  font-size:12px;display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;
}
.dash-head-close:hover{background:var(--c3);color:var(--t0);}
.dash-body{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:18px;}

.dash-hero{
  display:flex;align-items:center;gap:22px;
  padding:18px 22px;
  background:var(--c2);border-radius:8px;
}
.dash-ring-wrap{position:relative;width:104px;height:104px;flex-shrink:0;}
.dash-ring{transform:rotate(-90deg);}
.dash-ring-inner{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.dash-ring-val{font-family:var(--m);font-size:26px;font-weight:400;color:var(--t0);line-height:1;letter-spacing:-.03em;}
.dash-ring-lbl{font-family:var(--f);font-size:9px;color:var(--t2);letter-spacing:.1px;margin-top:4px;}
.dash-hero-info{flex:1;min-width:0;}
.dash-agent-nm{font-size:16px;font-weight:500;color:var(--t0);margin-bottom:3px;}
.dash-agent-shift{font-family:var(--f);font-size:10.5px;color:var(--t2);margin-bottom:10px;}
.dash-grade{
  display:inline-block;
  font-family:var(--f);font-size:10px;font-weight:700;
  padding:4px 11px;border-radius:20px;
  background:var(--gr2);color:var(--g);
  letter-spacing:.1px;
}
.dash-grade-desc{font-size:12px;color:var(--t1);margin-top:8px;line-height:1.5;}

.dash-section-lbl{
  font-family:var(--f);font-size:9.5px;font-weight:700;
  color:var(--t2);letter-spacing:.1px;
  margin-bottom:8px;
}
.dash-kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
.dash-kpi{
  padding:12px 14px;background:var(--c2);border-radius:8px;
  display:flex;flex-direction:column;gap:3px;
}
.dash-kpi-val{font-family:var(--m);font-size:18px;font-weight:400;color:var(--t0);line-height:1.1;letter-spacing:-.03em;}
.dash-kpi-val.g{color:var(--g);}
.dash-kpi-val.y{color:var(--y);}
.dash-kpi-val.r{color:var(--r);}
.dash-kpi-val.violet{color:var(--t0);}
.dash-kpi-val.blue{color:var(--t0);}
.dash-kpi-lbl{font-family:var(--f);font-size:9px;color:var(--t2);letter-spacing:.1px;margin-top:3px;}

/* Triángulo cromático — KPI accent backgrounds
   Violeta (emocional) · Azul (tiempo) · Verde (proceso) · Ámbar (cumplimiento) */
.kpi-violet{background:var(--c2);}
.kpi-blue{background:var(--c2);}
.kpi-green{background:var(--c2);}
.kpi-amber{background:var(--c2);}

/* Score bars — dsb — sin CSS previo, se añade aquí */
.dsb-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.dsb-lbl{font-family:var(--f);font-size:11px;font-weight:500;color:var(--t1);min-width:100px;}
.dsb-bar{flex:1;height:6px;background:var(--c3);border-radius:999px;overflow:hidden;}
.dsb-fill{height:100%;border-radius:999px;transition:width .65s cubic-bezier(.22,1,.36,1);}
/* Identidad por métrica — el ancho indica valor, el color indica QUÉ métrica es */
.dsb-fill.violet{background:linear-gradient(to right,rgba(91,134,245,.5),rgba(71,110,225,.85));}
.dsb-fill.blue{background:linear-gradient(to right,rgba(91,134,245,.5),rgba(71,110,225,.85));}
.dsb-fill.green{background:linear-gradient(to right,rgba(91,134,245,.5),rgba(71,110,225,.85));}
.dsb-fill.amber{background:linear-gradient(to right,rgba(91,134,245,.5),rgba(71,110,225,.85));}
.dsb-fill.brand{background:linear-gradient(to right,rgba(91,134,245,.5),rgba(71,110,225,.85));}
.dsb-num{font-family:var(--f);font-size:11px;font-weight:400;min-width:38px;text-align:right;}

/* Sentiment breakdown bars */
.dash-sent-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.dash-sent-ico{font-size:8px;min-width:20px;text-align:center;display:inline-flex;align-items:center;justify-content:center;}
.dash-sent-lbl{font-family:var(--f);font-size:11px;color:var(--t1);min-width:60px;}
.dash-sent-bar{flex:1;height:6px;background:var(--c3);border-radius:999px;overflow:hidden;}
.dash-sent-fill{height:100%;border-radius:999px;transition:width .65s cubic-bezier(.22,1,.36,1);}
.dash-sent-fill.pos{background:var(--g);}
.dash-sent-fill.neu{background:var(--y);}
.dash-sent-fill.neg{background:var(--r);}
.dash-sent-pct{font-family:var(--f);font-size:11px;font-weight:400;min-width:34px;text-align:right;}

.dash-call-list{display:flex;flex-direction:column;gap:4px;}
.dash-call{
  display:flex;align-items:center;gap:12px;
  padding:9px 14px;background:var(--c2);border-radius:6px;
  transition:background .12s;cursor:pointer;
}
.dash-call:hover{background:var(--c3);}
.dash-call-no{font-family:var(--f);font-size:10px;font-weight:700;color:var(--t2);min-width:22px;}
.dash-call-id{font-family:var(--f);font-size:10.5px;font-weight:400;color:var(--t0);flex:1;}
.dash-call-id .nm{color:var(--t1);font-weight:500;margin-left:4px;}
.dash-call-score{
  font-family:var(--f);font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;min-width:38px;text-align:center;
}
.dash-call-score.g{background:var(--gr2);color:var(--g);}
.dash-call-score.y{background:var(--am2);color:var(--y);}

.dash-foot{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 22px;flex-shrink:0;
  box-shadow:0 -1px 3px rgba(0,0,0,.04);
}
.dash-foot-note{font-family:var(--f);font-size:9.5px;color:var(--t2);}
.dash-foot-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:20px;
  border:2px solid var(--a);background:transparent;color:var(--a);
  font-family:var(--f);font-size:12px;font-weight:500;
  cursor:pointer;transition:background .15s;
}
.dash-foot-btn:hover{background:rgba(224,69,0,.06);}

/* ═══ BODY — 3 COLUMNS ═════════════════════════════ */
.body{flex:1;display:flex;overflow:hidden;background:var(--bg);}

/* ══ LEFT — PO Console (PRIMARY workspace) ══════════ */
.col-l{
  width:300px;min-width:300px;
  display:flex;flex-direction:column;
  background:var(--c1);
  border-right:1px solid var(--gb2);
  overflow:hidden;
}
.col-l::-webkit-scrollbar{width:0;}

.po-scroll{
  flex:1;overflow-y:auto;
  padding:10px 12px;
  display:flex;flex-direction:column;
  gap:6px;
}
.po-scroll::-webkit-scrollbar{width:5px;}
.po-scroll::-webkit-scrollbar-track{background:transparent;}
.po-scroll::-webkit-scrollbar-thumb{background:var(--c4);border-radius:5px;}

/* PO header card */
.po-top{
  background:var(--c1);
  padding:12px 14px 10px;
  border-bottom:1px solid var(--gb2);
  flex-shrink:0;
}
.po-top-row{
  display:flex;align-items:center;gap:10px;
  margin-bottom:11px;
}
.po-top-ico{
  width:28px;height:28px;border-radius:6px;
  background:var(--c3);color:var(--t1);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
}
.po-top-title{
  font-family:var(--f);font-size:12px;font-weight:500;color:var(--t0);
  flex:1;line-height:1.2;
}
.po-top-sub{font-size:10.5px;color:var(--t2);margin-top:1px;font-family:var(--f);font-weight:500;}
.po-top-badge{
  font-family:var(--f);font-size:10px;font-weight:400;
  padding:2px 7px;border-radius:4px;
  border:1px solid var(--gb2);background:var(--c2);color:var(--t2);
}
.po-top-badge.ready{background:transparent;color:var(--g);}
.po-progress{
  display:flex;align-items:center;gap:10px;
}
.po-progress-bar{
  flex:1;height:2px;background:var(--c3);border-radius:2px;overflow:hidden;
}
.po-progress-fill{
  height:100%;background:var(--t2);
  border-radius:2px;transition:width 1.2s cubic-bezier(.4,0,.2,1);
}
.po-progress-pct{
  font-family:var(--f);font-size:10px;font-weight:400;color:var(--t2);
  min-width:34px;text-align:right;
}
.po-progress-stats{
  font-family:var(--f);font-size:9.5px;color:var(--t2);
  letter-spacing:.2px;
}

/* Quick actions toolbar */
.po-tools{
  display:flex;gap:4px;
  padding:8px 6px;
  background:var(--c1);
  border-radius:6px;
  box-shadow:var(--sh-sm);
  flex-shrink:0;
}
.po-tool{
  flex:1;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:7px 4px;
  border-radius:6px;
  background:transparent;border:none;cursor:pointer;
  transition:background .12s,transform .12s;
}
.po-tool:hover{background:var(--c3);}
.po-tool:active{transform:scale(.96);}
.po-tool-ico{
  font-size:14px;width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
}
.po-tool-lbl{
  font-family:var(--f);font-size:7.5px;font-weight:700;
  color:var(--t1);letter-spacing:.3px;
}
.po-tool.accent .po-tool-ico{color:var(--a);}

/* Section card */
.ps{
  background:var(--c1);
  border-radius:8px;
  border:1px solid var(--gb2);
  overflow:hidden;
  flex-shrink:0;
}
.ps.tint-bl{background:var(--bl2);}
.ps.tint-gr{background:var(--gr2);}

.ps-head{
  padding:11px 14px 6px;
  display:flex;align-items:center;gap:8px;
}
.ps-head-ico{
  font-size:13px;width:18px;
  display:flex;align-items:center;justify-content:center;
}
.ps-head-lbl{
  font-family:var(--f);font-size:10px;font-weight:500;
  color:var(--t1);letter-spacing:.01px;
}
.ps.tint-bl .ps-head-lbl{color:var(--blue);}
.ps.tint-gr .ps-head-lbl{color:var(--g);}
.ps-head-meta{
  margin-left:auto;display:flex;align-items:center;gap:8px;
  font-family:var(--f);font-size:9.5px;color:var(--t2);
}
.ps-head-meta .val{color:var(--t0);font-weight:500;}
.ps-head-ratio{
  font-family:var(--f);font-size:9.5px;font-weight:400;
  padding:0;background:transparent;color:var(--t2);
}
.ps-head-ratio.full{color:var(--g);}
.ps-head-ratio.partial{color:var(--t1);}

.ps-body{
  padding:8px 12px 10px;
  display:flex;flex-direction:column;gap:8px;
}

.ps-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.ps-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.ps-grid-21{display:grid;grid-template-columns:2fr 1fr;gap:7px;}

/* Field */
.fld{
  position:relative;
  background:transparent;
  padding:0;
  cursor:text;
}
.fld:focus-within .fld-lbl{color:var(--t1);}
.fld-lbl{
  display:block;
  font-family:var(--f);font-size:9px;font-weight:400;
  color:var(--t2);letter-spacing:.02em;
  margin-bottom:2px;
  user-select:none;
}
.fld-lbl-row{display:flex;align-items:center;gap:5px;margin-bottom:2px;}
.fld-lbl-row .fld-lbl{margin-bottom:0;}
.fld-in{
  display:block;width:100%;
  background:transparent;border:none;outline:none;
  font-family:var(--f);font-size:12px;font-weight:400;
  color:var(--t0);padding:0;
}
.fld-in::placeholder{color:var(--t3);font-weight:400;}
.fld-in.empty{color:var(--t3);}

.ai-badge{
  display:inline-flex;align-items:center;justify-content:center;
  height:13px;padding:0 5px;
  border-radius:3px;
  background:var(--c3);color:var(--t2);
  font-family:var(--f);font-size:7px;font-weight:700;
  letter-spacing:.1px;text-transform:lowercase;
}
.conf-dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  vertical-align:middle;
}
.conf-dot.hi{background:var(--g);}
.conf-dot.md{background:var(--y);}
.conf-dot.lo{background:var(--r);}

@keyframes aiFlash{0%{background:rgba(14,168,116,.07);}100%{background:var(--c2);}}
.fld.flash{animation:aiFlash .7s ease;}

.fld-check{
  display:inline-flex;align-items:center;justify-content:center;
  width:13px;height:13px;border-radius:50%;
  background:var(--g);color:#fff;
  font-family:var(--f);font-size:8px;font-weight:600;
  flex-shrink:0;line-height:1;
  animation:checkIn .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes checkIn{
  0%{transform:scale(0);opacity:0;}
  60%{transform:scale(1.15);opacity:1;}
  100%{transform:scale(1);opacity:1;}
}

/* Phone field with country code */
.fld-phone{display:flex;align-items:center;gap:7px;}
.fld-phone-cc{
  display:flex;align-items:center;gap:4px;
  font-family:var(--f);font-size:11px;font-weight:400;color:var(--t2);
  white-space:nowrap;
}
.fld-phone-flag{font-size:9px;font-weight:500;color:var(--t2);letter-spacing:.02em;}
.fld-phone .fld-in{flex:1;}

/* Toggle pills (Emergency/VIP/EV) */
.tpills{display:flex;gap:5px;}
.tp-pill{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  padding:5px 4px;
  border-radius:5px;
  background:transparent;
  border:1px solid var(--gb2);
  font-family:var(--f);font-size:9.5px;font-weight:400;
  color:var(--t2);
  cursor:pointer;
  transition:all .12s;
}
.tp-pill:hover{background:var(--c2);}
.tp-pill.active{background:var(--c1);box-shadow:var(--sh-sm),inset 0 0 0 1.5px var(--t3);color:var(--t0);}
.tp-pill.active.r{box-shadow:0 1px 3px rgba(232,64,64,.15),inset 0 0 0 1.5px var(--r);color:var(--r);background:var(--re2);}
.tp-pill.active.v{box-shadow:0 1px 3px rgba(112,72,232,.15),inset 0 0 0 1.5px var(--v);color:var(--v);background:var(--pu2);}
.tp-pill.active.g{box-shadow:0 1px 3px rgba(14,168,116,.15),inset 0 0 0 1.5px var(--g);color:var(--g);background:var(--gr2);}

/* Inline toggle (WhatsApp etc) */
.fld-tog{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:2px 0;
  background:transparent;
  cursor:pointer;
}
.fld-tog-lbl{
  font-family:var(--f);font-size:9.5px;font-weight:600;
  color:var(--t1);letter-spacing:.1px;
}
.fld-tog-ico{font-size:11px;margin-right:4px;color:var(--t2);}
.fld-tog.on .fld-tog-ico{color:var(--g);}
.tog-switch{
  width:30px;height:18px;border-radius:18px;
  background:var(--c4);
  position:relative;transition:background .18s;flex-shrink:0;
}
.tog-switch::after{
  content:'';position:absolute;top:2px;left:2px;
  width:14px;height:14px;border-radius:50%;
  background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.15);
  transition:transform .18s;
}
.fld-tog.on .tog-switch{background:var(--g);}
.fld-tog.on .tog-switch::after{transform:translateX(12px);}

/* Segmented control */
.seg{
  display:flex;background:var(--c3);border-radius:6px;padding:3px;gap:2px;
}
.seg-opt{
  flex:1;padding:7px 10px;border-radius:3px;
  font-family:var(--f);font-size:9.5px;font-weight:700;
  color:var(--t2);letter-spacing:.1px;
  text-align:center;cursor:pointer;border:none;background:transparent;
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.seg-opt:hover{color:var(--t1);}
.seg-opt.active{
  background:var(--c1);color:var(--t0);box-shadow:var(--sh-sm);
}
.seg-opt.active.urgent{color:var(--a);}

/* Select dropdown */
.fld-sel{
  display:block;width:100%;
  background:transparent;border:none;outline:none;
  font-family:var(--f);font-size:12.5px;font-weight:500;
  color:var(--t0);padding:0;
  appearance:none;-webkit-appearance:none;-moz-appearance:none;
  cursor:pointer;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238892b0' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat:no-repeat;
  background-position:right 0 center;
  padding-right:14px;
}
.fld-sel.empty{color:var(--t3);}

/* Geo CTA */
.geo-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;
  padding:11px 14px;
  background:var(--a);
  color:#fff;
  font-family:var(--f);font-size:12.5px;font-weight:600;
  border-radius:8px;border:none;cursor:pointer;
  box-shadow:0 1px 3px rgba(224,69,0,.25),0 4px 10px rgba(224,69,0,.12);
  transition:all .15s;
}
.geo-btn:hover{background:var(--a2);box-shadow:0 1px 3px rgba(224,69,0,.35),0 6px 14px rgba(224,69,0,.2);}
.geo-btn:active{transform:translateY(1px);}
.geo-btn-ico{font-size:13px;}

/* ── Llamadas del turno (dashboard) ─────────────────── */
.dpo-detail{
  display:none;padding:14px 16px 12px;
  background:var(--c1);
  border-radius:0 0 10px 10px;
  margin-top:-5px;margin-bottom:5px;
  border-top:1px solid var(--c3);
}
.dpo-detail.show{display:block;}

/* KPIs del PO — 4 columnas */
.dpo-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:8px;margin-bottom:12px;
}
.dpo-metric{
  background:var(--c2);border-radius:8px;
  padding:9px 11px;
}
.dpo-metric-lbl{
  font-family:var(--f);font-size:9px;font-weight:600;
  color:var(--t2);letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:4px;
}
.dpo-metric-val{
  font-family:var(--f);font-size:15px;font-weight:700;
  color:var(--t0);line-height:1;
}

/* Barras de desglose — triángulo cromático */
.dpo-bars{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.dpo-bar-row{display:flex;align-items:center;gap:10px;}
.dpo-bar-lbl{
  font-family:var(--f);font-size:11px;font-weight:500;
  color:var(--t1);min-width:90px;
}
.dpo-bar-bg{
  flex:1;height:5px;background:var(--c3);
  border-radius:999px;overflow:hidden;
}
.dpo-bar-fill{
  height:100%;border-radius:999px;
  transition:width .55s cubic-bezier(.22,1,.36,1);
}
.dpo-bar-fill.violet{background:linear-gradient(to right,rgba(91,134,245,.5),rgba(71,110,225,.85));}
.dpo-bar-fill.blue{background:linear-gradient(to right,rgba(91,134,245,.5),rgba(71,110,225,.85));}
.dpo-bar-fill.green{background:linear-gradient(to right,rgba(91,134,245,.5),rgba(71,110,225,.85));}
.dpo-bar-fill.amber{background:linear-gradient(to right,rgba(91,134,245,.5),rgba(71,110,225,.85));}
.dpo-bar-num{
  font-family:var(--f);font-size:11px;font-weight:700;
  min-width:36px;text-align:right;
}

/* Speech — chips de protocolo */
.dpo-speech{display:flex;flex-wrap:wrap;gap:5px;}
.dpo-speech-chip{
  font-family:var(--f);font-size:10.5px;font-weight:600;
  padding:3px 9px;border-radius:20px;
}
.dpo-speech-chip.ok{background:var(--gr2);color:var(--g);}
.dpo-speech-chip.fail{background:var(--re2);color:var(--r);}

.dpo-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;
  background:var(--c2);margin-bottom:5px;
  cursor:pointer;transition:background .12s;
}
.dpo-row:hover{background:var(--c3);}
.dpo-row.open{border-radius:8px 8px 0 0;margin-bottom:0;}
.dpo-chevron{
  font-size:14px;color:var(--t2);
  transition:transform .2s;flex-shrink:0;
}
.dpo-row.open .dpo-chevron{transform:rotate(90deg);}
.dash-call-ts{font-family:var(--f);font-size:10px;color:var(--t2);flex-shrink:0;}
.dpo-detail{
  display:none;margin-bottom:5px;
  background:var(--c2);border-radius:0 0 8px 8px;
  padding:14px 16px 12px;border-top:1px solid var(--c3);
}
.dpo-detail.show{display:block;}

/* ── Cumplimiento de protocolo (dashboard) ──────────── */
.dsd-row{
  display:flex;align-items:center;gap:10px;
  padding:7px 10px;border-radius:6px;
  background:var(--c2);margin-bottom:5px;
}
.dsd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dsd-dot.ok{background:var(--g);}
.dsd-dot.fail{background:var(--r);}
.dsd-lbl{flex:1;font-family:var(--f);font-size:11.5px;color:var(--t1);}
.dsd-rate{font-family:var(--f);font-size:11px;font-weight:700;min-width:36px;text-align:right;}

/* ── Recomendaciones (dashboard) ────────────────────── */
.prog-wrap{background:var(--c2);border:1px solid var(--gb2);border-radius:8px;padding:10px 12px;}
.prog-hero{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.prog-val{font-family:var(--m);font-size:18px;font-weight:400;letter-spacing:-.03em;line-height:1;}
.prog-lbl{font-size:9px;color:var(--t3);margin-top:2px;}
.prog-spark{margin-left:auto;opacity:.85;}
.prog-dates{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);}
.dash-rec{
  border-radius:8px;padding:11px 13px;margin-bottom:8px;
  border-left:3px solid var(--c3);background:var(--c2);
}
.dash-rec.r{border-color:var(--r);}
.dash-rec.y{border-color:var(--y);}
.dash-rec.g{border-color:var(--g);}
.dash-rec-head{
  display:flex;align-items:center;gap:8px;
  margin-bottom:5px;
}
.dash-rec-ico{font-size:14px;flex-shrink:0;}
.dash-rec-title{
  flex:1;font-family:var(--f);font-size:12px;
  font-weight:700;color:var(--t0);line-height:1.3;
}
.dash-rec-badge{
  font-family:var(--f);font-size:9px;font-weight:700;
  padding:2px 8px;border-radius:20px;
  letter-spacing:.3px;flex-shrink:0;
}
.dash-rec-badge.r{background:var(--re2);color:var(--r);}
.dash-rec-badge.y{background:var(--am2);color:var(--y);}
.dash-rec-badge.g{background:var(--gr2);color:var(--g);}
.dash-rec-txt{
  font-family:var(--f);font-size:11px;
  color:var(--t1);line-height:1.55;
}

/* ── PO Drawer cards ─────────────────────────────────── */
.pd-card{
  background:var(--c2);border-radius:10px;
  padding:12px 14px;margin-bottom:8px;
  cursor:pointer;transition:background .12s;
  border:1px solid transparent;
}
.pd-card:hover{background:var(--c3);}
.pd-card.active{border-color:var(--a);background:var(--c1);}
.pd-card-top{
  display:flex;align-items:center;gap:8px;
  margin-bottom:8px;
}
.pd-card-num{
  font-family:var(--f);font-size:10px;font-weight:700;
  color:var(--a);flex-shrink:0;
}
.pd-card-svc{
  flex:1;font-family:var(--f);font-size:11px;
  font-weight:600;color:var(--t0);
}
.pd-card-ts{
  font-family:var(--f);font-size:10px;color:var(--t2);flex-shrink:0;
}
.pd-card-fields{display:flex;flex-wrap:wrap;gap:5px;}
.pd-card-tag{
  font-family:var(--f);font-size:10.5px;color:var(--t1);
  background:var(--c1);padding:2px 8px;border-radius:20px;
  border:1px solid var(--gb2);
}


#po-validate-popup{
  display:none;position:fixed;
  top:0;right:0;bottom:0;left:0;
  background:rgba(0,0,0,.52);
  z-index:2500;align-items:center;justify-content:center;
}
#po-validate-popup.show{display:flex;}
.pvp-modal{
  background:var(--c1);border-radius:12px;
  width:min(480px,92vw);max-height:85vh;
  display:flex;flex-direction:column;
  box-shadow:0 4px 32px rgba(0,0,0,.22);
  animation:dashIn .22s cubic-bezier(.34,1.56,.64,1);
}
.pvp-head{
  display:flex;align-items:center;gap:10px;
  padding:16px 18px 14px;
  border-bottom:1px solid var(--gb2);flex-shrink:0;
}
.pvp-head-title{flex:1;font-family:var(--f);font-size:14px;font-weight:500;color:var(--t0);}
.pvp-close{
  width:28px;height:28px;border-radius:8px;border:none;
  background:var(--c2);color:var(--t2);cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;
}
.pvp-body{flex:1;overflow-y:auto;padding:14px 18px;}
.pvp-warn{
  display:none;background:var(--am2);border-radius:8px;
  padding:8px 12px;margin-bottom:12px;
  font-family:var(--f);font-size:12px;font-weight:600;color:var(--y);
}
.pvp-warn.show{display:block;}
.pvp-field{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:8px;
  background:var(--c2);margin-bottom:6px;
}
.pvp-field.miss{background:rgba(240,144,10,.08);}
.pvp-field-ico{font-size:14px;min-width:20px;text-align:center;}
.pvp-field-info{flex:1;min-width:0;}
.pvp-field-lbl{font-family:var(--f);font-size:10px;font-weight:400;color:var(--t2);margin-bottom:2px;}
.pvp-input{
  width:100%;border:none;background:transparent;
  font-family:var(--f);font-size:13px;color:var(--t0);
  padding:0;outline:none;
}
.pvp-input.empty{color:var(--t3);}
.pvp-status{font-size:11px;font-weight:700;min-width:16px;text-align:center;}
.pvp-status.ok{color:var(--g);}
.pvp-status.miss{color:var(--r);}
.pvp-nota-wrap{
  display:flex;flex-direction:column;gap:5px;
  margin-top:10px;padding-top:10px;
  border-top:1px solid var(--gb2);
}
.pvp-nota-lbl{font-family:var(--f);font-size:10px;font-weight:600;color:var(--t2);}
#pvp-nota{
  width:100%;min-height:56px;resize:vertical;
  border:1px solid var(--gb2);border-radius:8px;
  padding:8px 10px;font-family:var(--f);font-size:12px;color:var(--t0);
  background:var(--c2);outline:none;line-height:1.5;
}
.pvp-foot{
  display:flex;gap:8px;padding:14px 18px;
  border-top:1px solid var(--gb2);flex-shrink:0;
}
.pvp-btn-sec{
  flex:1;padding:10px;border-radius:8px;
  border:1px solid var(--gb2);background:transparent;
  font-family:var(--f);font-size:13px;color:var(--t1);cursor:pointer;
  transition:background .12s;
}
.pvp-btn-sec:hover{background:var(--c2);}
.pvp-btn-pri{
  flex:2;padding:10px;border-radius:8px;
  border:2px solid var(--a);background:transparent;color:var(--a);
  font-family:var(--f);font-size:13px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .12s;
}
.pvp-btn-pri:hover{background:rgba(224,69,0,.06);}

/* CTA bar (sticky bottom of PO console) */
.po-cta-bar{
  display:flex;gap:8px;
  padding:10px 14px;
  background:var(--c1);
  box-shadow:0 -1px 3px rgba(0,0,0,.04),0 -4px 12px rgba(0,0,0,.03);
  flex-shrink:0;
}
.po-cta-btn{
  flex:1;
  padding:7px 10px;
  border-radius:7px;
  font-family:var(--f);font-size:11.5px;font-weight:500;
  cursor:pointer;border:none;
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.po-cta-btn.sec{background:var(--c2);color:var(--t1);}
.po-cta-btn.sec:hover{background:var(--c3);color:var(--t0);}
.po-cta-btn.pri{
  background:transparent;color:var(--a);
  border:2px solid var(--a);
}
.po-cta-btn.pri:hover{
  background:rgba(224,69,0,.06);
}

/* ══ CENTER — Transcript ════════════════════════════ */
.col-c{
  flex:1;display:flex;flex-direction:column;
  background:var(--bg);min-width:0;
  position:relative;
}
.tp-hd{
  height:46px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:rgba(255,255,255,.5);
  backdrop-filter:blur(10px);
}
.tp-lbl{
  font-family:var(--f);font-size:9.5px;font-weight:600;
  color:var(--t1);letter-spacing:.1px;
}
.live-b{
  display:flex;align-items:center;gap:6px;
  font-family:var(--f);font-size:9px;font-weight:700;color:var(--g);
  background:var(--gr2);
  border-radius:20px;padding:4px 11px;
  letter-spacing:.1px;
}
.ldot{
  width:6px;height:6px;border-radius:50%;background:var(--g);
  box-shadow:0 0 0 0 rgba(14,168,116,.5);animation:lp 2s ease infinite;
}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(14,168,116,.5);}60%{box-shadow:0 0 0 5px rgba(14,168,116,0);}}

.tp-wrap{flex:1;position:relative;display:flex;flex-direction:column;min-height:0;}
.tp-body{
  flex:1;overflow-y:auto;
  padding:24px 32px 8px;min-height:0;
}
.tp-body::-webkit-scrollbar{width:5px;}
.tp-body::-webkit-scrollbar-thumb{background:var(--c4);border-radius:5px;}

/* New bubble system */
.msg-group{margin-bottom:18px;display:flex;flex-direction:column;align-items:flex-start;}
.msg-group.client{align-items:flex-end;}
.spk-row{
  display:flex;align-items:center;gap:7px;margin-bottom:5px;
  width:100%;max-width:88%;
}
.msg-group.client .spk-row{justify-content:flex-end;}
.spk-av{
  width:18px;height:18px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:600;
  font-family:var(--f);
  background:var(--pu2);color:var(--v);
}
.msg-group.client .spk-av{background:var(--am2);color:var(--a);}
.spk-name{
  font-family:var(--f);font-size:9px;font-weight:700;
  color:var(--t2);letter-spacing:.1px;
}
.spk-time{
  font-family:var(--f);font-size:9px;color:var(--t3);
  margin-left:6px;
}
.msg-group.client .spk-time{order:-1;margin-left:0;margin-right:6px;}

.bubble{
  padding:10px 14px;
  font-size:12.5px;line-height:1.72;color:var(--t0);
  margin-bottom:3px;
  border-radius:6px;
  max-width:88%;
  transition:box-shadow .15s,background .15s;
}
.bubble.ag{
  background:var(--bl2);
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.02);
  border-left:2.5px solid var(--blue);
}
.bubble.ag:hover{
  background:rgba(59,110,248,.1);
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
}
.bubble.cl{
  background:var(--am2);
  align-self:flex-end;
  border-right:2.5px solid var(--y);
}
.bubble.cl:hover{background:rgba(240,144,10,.12);}

.bubble.streaming{border-right:2px solid rgba(14,168,116,.7);animation:blink .8s step-end infinite;}
@keyframes blink{0%,100%{border-color:rgba(14,168,116,.7);}50%{border-color:transparent;}}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg-anim{animation:fadeUp .3s ease both;}
.msg-pre{display:none;}

/* Typing indicator */
.typing-row{display:flex;align-items:center;gap:8px;margin:-4px 0 10px;}
.typing-bubble{
  background:rgba(255,255,255,.85);
  border-radius:0 6px 6px 6px;
  padding:9px 13px;
  display:flex;gap:4px;align-items:center;
  box-shadow:0 1px 2px rgba(0,0,0,.05);
}
.td{
  width:5px;height:5px;border-radius:50%;background:var(--t3);
  animation:td 1s ease infinite;
}
.td:nth-child(2){animation-delay:.15s;}
.td:nth-child(3){animation-delay:.3s;}
@keyframes td{0%,100%{opacity:.3;transform:translateY(0);}50%{opacity:1;transform:translateY(-3px);}}
.typing-lbl{
  font-family:var(--f);font-size:8.5px;color:var(--t2);
  letter-spacing:.1px;
}

/* Stream indicator */
.stream-row{
  display:flex;align-items:center;gap:6px;
  padding:0 0 8px;
}
.stream-dot{
  width:4px;height:4px;border-radius:50%;background:var(--g);
  animation:sdot 1.2s ease infinite;
}
.stream-dot:nth-child(2){animation-delay:.2s;}
.stream-dot:nth-child(3){animation-delay:.4s;}
@keyframes sdot{0%,100%{opacity:.2;transform:scale(.7);}50%{opacity:1;transform:scale(1);}}
.stream-lbl{
  font-family:var(--f);font-size:8.5px;color:var(--g);font-weight:600;
  letter-spacing:.1px;
}

/* Agent strip */
.agent-strip{
  flex-shrink:0;
  display:flex;align-items:center;gap:14px;
  padding:10px 24px;
  background:var(--c1);
  box-shadow:0 -1px 3px rgba(0,0,0,.04);
}
.as-av{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),#5b8bff);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;
}
.as-info{display:flex;flex-direction:column;gap:1px;}
.as-name{font-size:11.5px;font-weight:600;color:var(--t0);}
.as-shift{font-family:var(--f);font-size:9px;color:var(--t2);}
.as-sep{width:1px;height:22px;background:var(--c4);}
.as-kpi{display:flex;flex-direction:column;align-items:center;gap:1px;}
.as-kv{font-family:var(--f);font-size:13px;font-weight:700;color:var(--t0);line-height:1;}
.as-kv.g{color:var(--g);}
.as-kv.y{color:var(--y);}
.as-kl{font-family:var(--f);font-size:8px;color:var(--t2);letter-spacing:.1px;}
.as-goal{display:flex;align-items:center;gap:5px;}
.as-gn{font-family:var(--f);font-size:14px;font-weight:700;color:var(--t0);}
.as-gd{font-family:var(--f);font-size:10px;color:var(--t2);}
.as-star{font-size:11px;}
.as-bar-wrap{margin-left:6px;display:flex;flex-direction:column;gap:2px;}
.as-bar-lbl{font-family:var(--f);font-size:8px;color:var(--t2);letter-spacing:.1px;}
.as-bar-bg{width:60px;height:3px;background:var(--c3);border-radius:3px;overflow:hidden;}
.as-bar-fill{height:100%;background:var(--a);border-radius:3px;}

/* Scroll to bottom */
.t-scroll-arrow{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:6px 13px;
  display:none;align-items:center;gap:5px;
  font-family:var(--f);font-size:9.5px;font-weight:600;color:var(--t1);
  cursor:pointer;border:none;
  box-shadow:0 1px 3px rgba(0,0,0,.08),0 6px 18px rgba(0,0,0,.06);
  transition:all .15s;
}
.t-scroll-arrow.show{display:flex;}
.t-scroll-arrow:hover{color:var(--t0);background:#fff;}

/* ══ RIGHT — Context / KAI / Recs ═══════════════════ */
.col-r{
  width:290px;min-width:290px;
  display:flex;flex-direction:column;
  background:var(--bg);
  overflow:hidden;
}
.ctx-scroll{
  flex:1;overflow-y:auto;
  padding:14px 14px;
  display:flex;flex-direction:column;gap:10px;
}
.ctx-scroll::-webkit-scrollbar{width:5px;}
.ctx-scroll::-webkit-scrollbar-thumb{background:var(--c4);border-radius:5px;}

/* ── col-r cards rediseño ── */
.ctx-card{
  background:var(--c1);
  border-radius:10px;
  border:0.5px solid var(--gb2);
  overflow:hidden;
}
.ctx-head{
  display:flex;align-items:center;gap:8px;
  padding:10px 13px 9px;
  border-bottom:0.5px solid var(--gb2);
  margin-bottom:0;
}
.ctx-head-ico{
  width:22px;height:22px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;
}
.ctx-head-lbl{
  font-family:var(--f);font-size:11px;font-weight:600;
  color:var(--t0);letter-spacing:.01em;flex:1;
}
.ctx-head-conf{
  font-family:var(--f);font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:20px;
  background:var(--gr2);color:var(--g);
}

/* Service detected */
.svc-detected{
  display:flex;align-items:flex-start;gap:9px;
  padding:10px 13px 8px;
}
.svc-ico{
  width:26px;height:26px;border-radius:5px;flex-shrink:0;
  background:var(--c2);border:1px solid var(--gb2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;margin-top:1px;
}
.svc-nm{font-size:12px;font-weight:600;color:var(--t0);margin-bottom:2px;}
.svc-ht{font-size:10.5px;color:var(--t1);line-height:1.4;}
.svc-conf-row{
  display:flex;align-items:center;gap:6px;
  padding:0 13px 10px;
}
.svc-conf-dot{width:6px;height:6px;border-radius:50%;background:var(--g);flex-shrink:0;}
.svc-conf-lbl{font-size:10px;color:var(--t2);font-family:var(--f);}
.svc-conf-bar{flex:1;height:3px;background:var(--c3);border-radius:3px;overflow:hidden;}
.svc-conf-fill{height:100%;background:var(--g);border-radius:3px;transition:width .4s;}
.svc-conf-pct{font-size:10px;font-weight:600;color:var(--g);font-family:var(--m);}

/* Sentiment */
.sent-body{padding:10px 13px 12px;}
.sent-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sent-emo{font-size:18px;line-height:1;color:var(--t2);}
.sent-info{flex:1;}
.sent-lbl{font-size:12px;font-weight:500;color:var(--t0);}
.sent-sub{font-size:10px;color:var(--t2);margin-top:1px;font-family:var(--f);}
.sent-pct{font-family:var(--m);font-size:12px;font-weight:400;color:var(--t1);}
.sent-track{height:2px;background:var(--c3);border-radius:2px;overflow:hidden;}
.sent-fill{height:100%;background:var(--t3);border-radius:5px;transition:width .6s,background .4s;}
.sent-scale{display:flex;justify-content:space-between;margin-top:4px;}
.sent-scale span{font-size:9px;color:var(--t3);font-family:var(--f);}

/* Checklist rediseñado */
.kai-check-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 13px;
  cursor:pointer;transition:background .12s;
  border-radius:0;
}
.kai-check-item:hover{background:var(--c2);}
.kai-check-item.done .kai-check-txt{
  text-decoration:line-through;
  color:var(--t3);
}
.kai-check-item.done .kai-check-box{
  background:var(--c2);border-color:var(--c3);color:var(--t2);
}
.kai-check-box{
  width:14px;height:14px;border-radius:3px;
  border:1px solid var(--c3);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;background:var(--c1);
  transition:all .15s;
}
.kai-check-txt{font-size:11px;color:var(--t1);line-height:1.4;flex:1;}
.kai-check-num{font-size:9px;color:var(--t3);font-weight:500;flex-shrink:0;}
.kai-chk-progress{
  display:flex;align-items:center;gap:8px;
  padding:8px 13px 10px;
  border-top:0.5px solid var(--gb2);
  margin-top:4px;
}
.kai-chk-bar{flex:1;height:1.5px;background:var(--c3);border-radius:2px;overflow:hidden;}
.kai-chk-fill{height:100%;background:var(--t2);border-radius:2px;transition:width .3s;}
.kai-chk-lbl{font-size:9px;color:var(--t2);font-weight:400;white-space:nowrap;font-family:var(--f);}

/* Recs — emergent stack inside the context panel (col-r) */
.rec-popup-stack{
  display:flex;flex-direction:column;gap:7px;
  margin-bottom:2px;
}
.rec-popup-stack:empty{display:none;}
.rec-toast{
  display:flex;align-items:flex-start;gap:9px;
  background:var(--c1);
  border-radius:6px;
  padding:11px 12px 11px 13px;
  box-shadow:var(--sh-sm);
  transform:translateY(-6px);opacity:0;
  animation:recIn .3s cubic-bezier(.34,1.56,.64,1) forwards;
  transition:opacity .45s ease,max-height .45s ease,padding .45s ease,margin .45s ease,box-shadow .15s;
  overflow:hidden;
  max-height:140px;
}
.rec-toast:hover{box-shadow:var(--sh);}
@keyframes recIn{to{transform:translateY(0);opacity:1;}}
.rec-toast.done{
  opacity:0;max-height:0;padding-top:0;padding-bottom:0;margin:0;
}
.rec-priority-dot{
  width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px;
}
.rec-priority-dot.hi{background:var(--r);}
.rec-priority-dot.md{background:var(--y);}
.rec-priority-dot.lo{background:var(--g);}
.rec-body{flex:1;min-width:0;}
.rec-lbl{
  font-family:var(--f);font-size:8px;font-weight:700;
  color:var(--t2);letter-spacing:.1px;
  margin-bottom:3px;
}
.rec-txt{font-size:11.5px;line-height:1.5;color:var(--t1);}
.rec-done-btn{
  width:22px;height:22px;border-radius:3px;flex-shrink:0;
  background:transparent;color:var(--t2);
  font-size:11px;cursor:pointer;border:none;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;margin-top:-2px;
}
.rec-done-btn:hover{background:var(--gr2);color:var(--g);}

/* AI guidance pill */
.kai-pill{
  display:flex;align-items:flex-start;gap:9px;
  padding:10px 12px;
  background:var(--pu2);
  border-radius:6px;
}
.kai-pill-ico{
  width:24px;height:24px;border-radius:5px;flex-shrink:0;
  background:rgba(112,72,232,.18);color:var(--v);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;font-family:var(--f);
}
.kai-pill-body{flex:1;min-width:0;}
.kai-pill-lbl{
  font-family:var(--f);font-size:8px;font-weight:700;
  color:var(--v);letter-spacing:.1px;
  margin-bottom:3px;
}
.kai-pill-txt{font-size:11.5px;line-height:1.5;color:var(--t1);}

/* Empty state */
.xmpty{
  display:flex;flex-direction:column;align-items:center;
  gap:8px;padding:18px 12px;text-align:center;
}
.xmpty .ico{font-size:22px;opacity:.2;}
.xmpty .lbl{font-family:var(--f);font-size:9.5px;color:var(--t1);letter-spacing:.3px;}

/* ═══ HINT BANNER (preview only) ═══════════════════ */
.preview-hint{
  position:fixed;bottom:14px;right:14px;
  background:var(--c1);border-radius:6px;
  box-shadow:var(--sh);
  padding:10px 14px;
  max-width:280px;
  font-size:11px;color:var(--t1);line-height:1.5;
  z-index:1000;
  display:flex;gap:9px;
  animation:fadeUp .5s ease both;
}
.preview-hint-ico{
  width:24px;height:24px;border-radius:5px;flex-shrink:0;
  background:var(--pu2);color:var(--v);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
}
.preview-hint-body{flex:1;}
.preview-hint-title{
  font-family:var(--f);font-size:8.5px;font-weight:700;color:var(--v);
  letter-spacing:.1px;margin-bottom:2px;
}
.preview-hint-close{
  position:absolute;top:5px;right:7px;
  width:18px;height:18px;border-radius:3px;border:none;
  background:transparent;color:var(--t3);cursor:pointer;font-size:13px;
}
.preview-hint-close:hover{color:var(--t1);background:var(--c3);}

@media (max-width:1180px){
  .col-l{width:380px;min-width:340px;}
  .col-r{width:260px;min-width:240px;}
}
@media (max-width:900px){
  .col-l{width:320px;min-width:300px;}
  .col-r{width:240px;min-width:220px;}
}

/* ══ MOBILE ≤768px — Jorge's design system ══════════════════════════════ */
@media (max-width:768px){

  /* Nav — tight, Jorge style */
  nav{height:44px;padding:0 12px;gap:8px;background:var(--c1);}
  .n-brand>div>div{display:none;}
  .n-brand>div>span:first-child{font-size:12px;font-weight:500;}
  .n-r{gap:4px;}
  .n-dash{height:26px;padding:0 8px;font-size:10px;}
  .qbtn{height:26px;padding:0 8px;font-size:10px;}
  .n-demo{display:none;}
  .n-ver{display:none;}
  #status-wrap>button{padding:0 8px;height:26px;}
  #status-label{display:none!important;}

  /* Body — single-col with tab switching */
  .body{
    flex-direction:column;
    height:calc(100dvh - 44px - 50px);
    overflow:hidden;
    position:relative;
    background:var(--c2);
  }

  /* All cols — positioned, only active shows */
  .col-l,.col-c,.col-r{
    position:absolute;inset:0;
    width:100%!important;min-width:100%!important;
    height:100%!important;max-height:100%!important;
    border:none;overflow-y:auto;
    opacity:0;pointer-events:none;
    transition:opacity .15s ease,transform .15s ease;
    transform:translateY(4px);
  }
  .col-l.mob-active,.col-c.mob-active,.col-r.mob-active{
    opacity:1;pointer-events:auto;transform:translateY(0);z-index:1;
  }

  /* ── COL L — PO (Jorge style) ── */
  .col-l{background:var(--c1);}

  /* PO header */
  .ps-head{
    padding:10px 13px 9px!important;
    border-bottom:1px solid var(--gb2)!important;
    background:var(--c1)!important;
  }
  .ps-head-lbl{font-size:11px!important;font-weight:500!important;}
  .ps-head-ico{font-size:13px!important;}
  .ps-head-ratio{font-size:10px!important;}

  /* PO sections */
  .po-scroll{padding:8px 10px!important;gap:5px!important;}
  .ps{border-radius:7px!important;border:1px solid var(--gb2)!important;overflow:hidden;}
  .ps-body{padding:9px 11px 11px!important;gap:6px!important;}

  /* Fields — Jorge's cleaner grid */
  .fld{border:none!important;border-radius:0!important;padding:0!important;background:transparent!important;}
  .fld-lbl-row{margin-bottom:2px;}

  /* Menus */

}

.kai-wizard-ov {

.kai-wizard {

}
.kai-wizard-hero {
  background:var(--c1);
  padding:24px 28px 20px;

}
.kai-wizard-logo {
  height:24px;width:auto;display:block;

.kai-wizard-title {

  font-size:12.5px;color:var(--t2);

.kai-wizard-features {

}
.kai-wizard-feat {

}
.kai-wizard-feat-ico {

}
.kai-wizard-feat-info {}
.kai-wizard-feat-title {

}
.kai-wizard-feat-desc {

}
.kai-wizard-footer {

.kai-wizard-toggle {

.kai-wizard-toggle input { cursor:pointer; }
.kai-wizard-btn {

}
.kai-wizard-btn:hover { background:rgba(224,69,0,.06); }

/* ── KAI Checklist ── */
.kai-checklist { display:flex;flex-direction:column;gap:4px;padding:0 2px; }

.kai-check-item {
  display:flex;align-items:flex-start;gap:9px;
  padding:7px 10px;border-radius:8px;
  background:var(--c2);
  border:1px solid transparent;
  transition:all .2s;cursor:pointer;
  user-select:none;
}
.kai-check-item:hover { background:var(--c3); }
.kai-check-item.done {
  opacity:.45;
  text-decoration:line-through;
}
.kai-check-item.done .kai-check-box {
  background:var(--g);border-color:var(--g);color:#fff;
}
.kai-check-item.alert {
  background:rgba(232,64,64,.06);
  border-color:rgba(232,64,64,.2);
}
.kai-check-item.alert .kai-check-box {
  background:rgba(232,64,64,.1);
  border-color:rgba(232,64,64,.3);
  color:var(--r);
}

.kai-check-box {
  width:18px;height:18px;border-radius:5px;
  border:1.5px solid var(--gb2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;flex-shrink:0;margin-top:1px;
  transition:all .15s;background:var(--c1);
}
.kai-check-txt {
  font-size:11.5px;color:var(--t0);
  font-family:var(--f);font-weight:500;line-height:1.4;flex:1;
}
.kai-check-sub {
  font-size:10px;color:var(--t2);margin-top:2px;
  font-family:var(--f);font-weight:400;
}

/* KAI insight card */
.kai-insight {
  margin:8px 0 4px;
  padding:7px 10px;
  border-radius:0;
  background:transparent;
  border:none;
  border-left:2px solid var(--c3);

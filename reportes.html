<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONNECT · Reportes & Analytics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#eef0f7;color:#0d1018;height:100vh;display:flex;flex-direction:column;}
:root{--a:#E8440A;--g:#6aaa90;--y:#bf9455;--r:#cc7580;--m:'SF Mono','Fira Code',monospace;}

/* Header */
.hd{height:52px;background:#fff;border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
.hd-brand{font-size:18px;font-weight:800;color:#E8440A;letter-spacing:-.02em;}
.hd-reg{font-size:10px;color:#E8440A;margin-left:1px;}
.hd-title{font-size:13px;font-weight:600;color:#0d1018;margin-left:4px;}
.hd-back{margin-left:auto;padding:6px 14px;border-radius:8px;border:1px solid rgba(0,0,0,.1);background:#fff;color:#6b7280;font-size:12px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;}
.hd-back:hover{background:#f5f5f5;}

/* Layout */
.layout{display:flex;flex:1;min-height:0;overflow:hidden;}

/* Sidebar */
.sb{width:200px;min-width:200px;background:#fff;border-right:1px solid rgba(0,0,0,.08);padding:16px 0;overflow-y:auto;flex-shrink:0;}
.sb-sec{font-family:var(--m);font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;padding:8px 16px 4px;font-weight:600;}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;font-size:12px;color:#374151;transition:all .1s;border-left:2px solid transparent;}
.sb-item:hover{background:#f9fafb;color:#0d1018;}
.sb-item.active{background:rgba(232,68,10,.05);color:#E8440A;border-left-color:#E8440A;font-weight:600;}
.sb-item .ico{font-size:14px;}
.sb-divider{height:1px;background:rgba(0,0,0,.06);margin:8px 0;}

/* Filters */
.filters{display:flex;align-items:center;gap:8px;padding:12px 20px;background:#fff;border-bottom:1px solid rgba(0,0,0,.06);flex-shrink:0;flex-wrap:wrap;}
.filter-pill{padding:5px 12px;border-radius:20px;border:1px solid rgba(0,0,0,.1);background:#fff;font-size:11px;color:#374151;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .1s;}
.filter-pill:hover{border-color:#E8440A;color:#E8440A;}
.filter-pill.active{background:#E8440A;color:#fff;border-color:#E8440A;}
.filter-pill .arr{font-size:9px;opacity:.6;}

/* Content */
.content{flex:1;min-width:0;overflow-y:auto;padding:20px;}

/* Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.kpi-card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:16px;}
.kpi-val{font-size:26px;font-weight:700;color:#0d1018;letter-spacing:-.03em;line-height:1;}
.kpi-lbl{font-family:var(--m);font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em;margin-top:5px;}
.kpi-delta{font-size:11px;color:#6aaa90;margin-top:4px;}

.sec-title{font-family:var(--m);font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:10px;}
.card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:16px;margin-bottom:12px;}

/* Table */
.tbl-wrap{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:12px;overflow:hidden;margin-bottom:16px;}
table{width:100%;border-collapse:collapse;}
th{padding:9px 14px;text-align:left;font-family:var(--m);font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em;background:#f9fafb;border-bottom:1px solid rgba(0,0,0,.06);}
td{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.04);font-size:12px;color:#374151;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.av{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.tag{display:inline-block;font-family:var(--m);font-size:9px;padding:2px 8px;border-radius:20px;border:1px solid;font-weight:500;}
.bar{height:3px;border-radius:2px;overflow:hidden;background:rgba(0,0,0,.07);margin-top:3px;}
.bar-fill{height:100%;border-radius:2px;}
.score-badge{display:inline-flex;align-items:center;justify-content:center;width:36px;height:22px;border-radius:6px;font-family:var(--m);font-size:11px;font-weight:700;}

/* Coaching */
.plan-card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:18px;margin-bottom:12px;}
.plan-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.plan-pct{font-size:22px;font-weight:700;margin-left:auto;}
.plan-bar{height:6px;background:rgba(0,0,0,.07);border-radius:3px;overflow:hidden;margin-bottom:10px;}
.plan-bar-fill{height:100%;border-radius:3px;}
.plan-act{font-size:12px;color:#6b7280;padding:2px 0;display:flex;align-items:center;gap:6px;}
.plan-act::before{content:'→';color:#9ca3af;}
</style>
</head>
<body>

<div class="hd">
  <span class="hd-brand">CONNECT</span><span class="hd-reg">®</span>
  <span class="hd-title">Reportes & Analytics</span>
  <a href="app.html" class="hd-back">← Volver a la app</a>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sb">
    <div class="sb-sec">General</div>
    <div class="sb-item active" onclick="showView('resumen')"><span class="ico">📊</span>Resumen</div>
    <div class="sb-item" onclick="showView('agentes')"><span class="ico">🎧</span>Agentes</div>
    <div class="sb-divider"></div>
    <div class="sb-sec">Por Rol</div>
    <div class="sb-item" onclick="showView('supervisor')"><span class="ico">📈</span>Supervisor</div>
    <div class="sb-item" onclick="showView('formador')"><span class="ico">🎓</span>Formador</div>
    <div class="sb-item" onclick="showView('agente_v')"><span class="ico">👤</span>Por agente</div>
    <div class="sb-divider"></div>
    <div class="sb-sec">Análisis</div>
    <div class="sb-item" onclick="showView('feedback')"><span class="ico">💬</span>Feedback</div>
    <div class="sb-item" onclick="showView('coaching')"><span class="ico">🎯</span>Coaching</div>
  </div>

  <!-- Main -->
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;">
    <!-- Filters -->
    <div class="filters">
      <div class="filter-pill active">Esta semana</div>
      <div class="filter-pill">Agente <span class="arr">▾</span></div>
      <div class="filter-pill">Carril <span class="arr">▾</span></div>
      <div class="filter-pill">País <span class="arr">▾</span></div>
      <div class="filter-pill">Cuenta <span class="arr">▾</span></div>
    </div>
    <!-- Content -->
    <div class="content" id="main-content"></div>
  </div>
</div>

<script>
var RA=[
  {id:1,name:'Dayana García',letter:'D',color:'#ff5c00',carril:'Home',pais:'Costa Rica',calls:187,pos:142,aht:'3:52',sat:92,speech:96,score:91,grade:'A'},
  {id:2,name:'Carlos Mora',letter:'C',color:'#6aaa90',carril:'Road',pais:'Costa Rica',calls:164,pos:118,aht:'4:31',sat:84,speech:88,score:83,grade:'B'},
  {id:3,name:'Valeria Núñez',letter:'V',color:'#cc7580',carril:'Concierge',pais:'Panamá',calls:201,pos:167,aht:'3:44',sat:95,speech:98,score:94,grade:'A'},
  {id:4,name:'Luis Arias',letter:'L',color:'#4a8a72',carril:'Home',pais:'Costa Rica',calls:143,pos:98,aht:'5:12',sat:71,speech:79,score:72,grade:'C'},
  {id:5,name:'Sofía Ramírez',letter:'S',color:'#bf9455',carril:'Road',pais:'Guatemala',calls:178,pos:134,aht:'4:05',sat:88,speech:91,score:87,grade:'B'},
  {id:6,name:'Andrés Fallas',letter:'A',color:'#6366f1',carril:'Concierge',pais:'Costa Rica',calls:156,pos:121,aht:'4:22',sat:82,speech:86,score:81,grade:'B'},
  {id:7,name:'María Solano',letter:'M',color:'#8b5cf6',carril:'Home',pais:'Honduras',calls:132,pos:89,aht:'5:44',sat:68,speech:74,score:68,grade:'C'},
  {id:8,name:'José Quesada',letter:'J',color:'#0ea5e9',carril:'Road',pais:'Panamá',calls:169,pos:128,aht:'4:18',sat:86,speech:90,score:85,grade:'B'}
];
var RC=[
  {agent:'Luis Arias',obj:'Reducir AHT a menos de 4:30',acts:['Preguntas clave en primeros 60s','Role-play apertura'],dl:'30 abr',pct:35,coach:'Roberto Salas'},
  {agent:'María Solano',obj:'Speech compliance al 90%',acts:['5 grabaciones/semana','Sesión con formador'],dl:'5 may',pct:20,coach:'Ana Vega'},
  {agent:'Carlos Mora',obj:'Comunicar ETA en 100% llamadas',acts:['Checklist visual','Feedback diario'],dl:'28 abr',pct:60,coach:'Roberto Salas'}
];
var RF=[
  {agent:'Dayana García',by:'Ana Vega',role:'Supervisora',date:'23 abr',text:'Excelente manejo del cliente molesto. Resolución rápida.',tags:['Empatía','Resolución'],priority:'baja'},
  {agent:'Luis Arias',by:'Roberto Salas',role:'Supervisor',date:'22 abr',text:'AHT elevado. Demora en confirmar ubicación.',tags:['AHT','Protocolo'],priority:'alta'},
  {agent:'Carlos Mora',by:'Ana Vega',role:'Supervisora',date:'21 abr',text:'No siempre comunica ETA antes de despedirse.',tags:['ETA','Cierre'],priority:'media'},
  {agent:'María Solano',by:'Roberto Salas',role:'Supervisor',date:'21 abr',text:'Speech bajo. Omite saludo en 4 de 10 llamadas.',tags:['Speech','Saludo'],priority:'alta'}
];
var RP=[
  {icon:'📉',title:'AHT elevado en Road',type:'neg',desc:'3 agentes con AHT 18% sobre objetivo.',agents:'Carlos Mora, Luis Arias, José Quesada'},
  {icon:'⭐',title:'Alto rendimiento Concierge',type:'pos',desc:'Satisfacción +90% consistente.',agents:'Valeria Núñez, Andrés Fallas'},
  {icon:'⚠️',title:'Omisión de ETA',type:'neg',desc:'40% de agentes no comunican ETA al cerrar.',agents:'Carlos Mora, Luis Arias, Andrés Fallas'},
  {icon:'📈',title:'Mejora en speech',type:'pos',desc:'Speech compliance +8% en 2 semanas.',agents:'Dayana García, Sofía Ramírez'}
];

function rc(v){return v>=85?'#6aaa90':v>=70?'#bf9455':'#cc7580';}
function rbar(v){return '<div class="bar"><div class="bar-fill" style="width:'+v+'%;background:'+rc(v)+'"></div></div>';}
function rscore(a){var bg=a.grade==='A'?'rgba(106,170,144,.15)':a.grade==='B'?'rgba(191,148,85,.15)':'rgba(204,117,128,.15)';var c=a.grade==='A'?'#6aaa90':a.grade==='B'?'#bf9455':'#cc7580';return'<span class="score-badge" style="background:'+bg+';color:'+c+';">'+a.score+'</span>';}

function showView(v){
  // Update sidebar
  document.querySelectorAll('.sb-item').forEach(function(el){el.classList.remove('active');});
  var clicked=document.querySelector('[onclick="showView(\''+v+'\')"]');
  if(clicked)clicked.classList.add('active');
  
  var c=document.getElementById('main-content');
  if(v==='resumen'){
    var tot={calls:0,pos:0,sat:0,sp:0,sc:0};
    RA.forEach(function(a){tot.calls+=a.calls;tot.pos+=a.pos;tot.sat+=a.sat;tot.sp+=a.speech;tot.sc+=a.score;});
    var n=RA.length;
    c.innerHTML=
      '<div class="kpi-grid">'+
        [['Llamadas',tot.calls,'▲12%'],['POs Creados',tot.pos,'▲8%'],['Satisfacción',Math.round(tot.sat/n)+'%','▲2%'],['Speech',Math.round(tot.sp/n)+'%','▲5%'],['Score',Math.round(tot.sc/n),'▲3%']].map(function(k){
          return'<div class="kpi-card"><div class="kpi-val">'+k[1]+'</div><div class="kpi-lbl">'+k[0]+'</div><div class="kpi-delta">'+k[2]+'</div></div>';
        }).join('')+
      '</div>'+
      '<div class="sec-title">Resumen por agente</div>'+viewAgentes();
  }else if(v==='agentes'){
    c.innerHTML='<div class="sec-title">Todos los agentes</div>'+viewAgentes();
  }else if(v==='supervisor'){
    c.innerHTML=viewSupervisor();
  }else if(v==='formador'){
    c.innerHTML=viewFormador();
  }else if(v==='agente_v'){
    c.innerHTML=viewPorAgente();
  }else if(v==='feedback'){
    c.innerHTML=viewFeedback();
  }else if(v==='coaching'){
    c.innerHTML='<div class="sec-title">Planes de coaching activos</div>'+viewCoaching();
  }
}

function viewAgentes(){
  var ths=['Agente','Carril','País','Llamadas','AHT','Satisf.','Speech','Score'].map(function(x){return'<th>'+x+'</th>';}).join('');
  var trs=RA.map(function(a){
    var cC={Home:'#6366f1',Road:'#6aaa90',Concierge:'#bf9455'};
    return'<tr>'+
      '<td><div style="display:flex;align-items:center;gap:9px;"><div class="av" style="background:'+a.color+'">'+a.letter+'</div><div><div style="font-weight:600;color:#0d1018;">'+a.name+'</div></div></div></td>'+
      '<td><span class="tag" style="color:'+( cC[a.carril]||'#374151')+';border-color:currentColor;background:rgba(0,0,0,.03);">'+a.carril+'</span></td>'+
      '<td style="color:#6b7280;">'+a.pais+'</td>'+
      '<td style="font-weight:600;">'+a.calls+'</td>'+
      '<td>'+a.aht+'</td>'+
      '<td><div style="font-weight:600;color:'+rc(a.sat)+';">'+a.sat+'%</div>'+rbar(a.sat)+'</td>'+
      '<td><div style="font-weight:600;color:'+rc(a.speech)+';">'+a.speech+'%</div></td>'+
      '<td>'+rscore(a)+'</td>'+
    '</tr>';
  }).join('');
  return'<div class="tbl-wrap"><table><thead><tr>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table></div>';
}

function viewSupervisor(){
  var pats=RP.map(function(p){
    var c=p.type==='pos'?'#6aaa90':p.type==='neg'?'#cc7580':'#bf9455';
    var lbl=p.type==='pos'?'Positivo':p.type==='neg'?'Atención':'Neutro';
    return'<div class="card" style="border-left:3px solid '+c+';">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">'+
        '<span style="font-size:18px;">'+p.icon+'</span>'+
        '<span style="font-size:13px;font-weight:600;color:#0d1018;flex:1;">'+p.title+'</span>'+
        '<span class="tag" style="color:'+c+';border-color:'+c+';background:rgba(0,0,0,.03);">'+lbl+'</span>'+
      '</div>'+
      '<div style="font-size:12px;color:#6b7280;margin-bottom:4px;">'+p.desc+'</div>'+
      '<div style="font-size:11px;color:#9ca3af;">👥 '+p.agents+'</div>'+
    '</div>';
  }).join('');
  var sorted=RA.slice().sort(function(a,b){return b.score-a.score;});
  var ranking=sorted.map(function(a,i){
    var mc=i===0?'#bf9455':i===1?'#9ca3af':i===2?'#a67c45':'#d1d5db';
    return'<div style="display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05);">'+
      '<span style="font-weight:700;font-size:13px;width:20px;color:'+mc+';">'+(i+1)+'</span>'+
      '<div class="av" style="background:'+a.color+';">'+a.letter+'</div>'+
      '<span style="flex:1;font-size:13px;">'+a.name+'</span>'+
      rscore(a)+rbar(a.score)+
    '</div>';
  }).join('');
  return'<div class="sec-title">Patrones detectados</div>'+pats+
    '<div class="sec-title">Ranking del equipo</div><div class="card">'+ranking+'</div>';
}

function viewFormador(){
  var opps=[
    {a:'Protocolo de apertura',imp:'alto',ag:'Luis Arias, María Solano',d:'Estandarizar saludo y preguntas clave en primeros 45 segundos.'},
    {a:'Comunicación de ETA',imp:'alto',ag:'Carlos Mora, Luis Arias',d:'Confirmar ETA antes de cerrar TODAS las llamadas.'},
    {a:'Clientes molestos',imp:'medio',ag:'Luis Arias, María Solano',d:'Técnicas de desescalada y lenguaje empático.'}
  ];
  var iC={alto:'#cc7580',medio:'#bf9455',bajo:'#6aaa90'};
  var opHtml=opps.map(function(o){
    return'<div class="card">'+
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">'+
        '<span style="font-size:13px;font-weight:600;color:#0d1018;flex:1;">'+o.a+'</span>'+
        '<span style="font-size:10px;font-weight:600;color:'+iC[o.imp]+';">'+o.imp+'</span>'+
      '</div>'+
      '<div style="font-size:12px;color:#6b7280;margin-bottom:4px;">'+o.d+'</div>'+
      '<div style="font-size:11px;color:#9ca3af;">'+o.ag+'</div>'+
    '</div>';
  }).join('');
  return'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">'+
    '<div><div class="sec-title">Oportunidades de mejora</div>'+opHtml+'</div>'+
    '<div><div class="sec-title">Planes activos</div>'+viewCoaching()+'</div>'+
  '</div>';
}

function viewPorAgente(){
  var opts=RA.map(function(a){return'<option value="'+a.id+'">'+a.name+'</option>';}).join('');
  return'<select id="ag-sel" onchange="renderAgente(this.value)" style="margin-bottom:16px;padding:8px 12px;border-radius:8px;border:1px solid rgba(0,0,0,.1);background:#fff;font-size:13px;width:240px;cursor:pointer;"><option value="">Seleccionar agente...</option>'+opts+'</select>'+
    '<div id="ag-detail" style="color:#9ca3af;font-size:13px;padding:20px 0;">Selecciona un agente para ver su perfil.</div>';
}

function renderAgente(id){
  var a=RA.find(function(x){return x.id==id;});
  var d=document.getElementById('ag-detail');
  if(!a||!d)return;
  var af=RF.filter(function(f){return f.agent===a.name;});
  var ap=RC.find(function(p){return p.agent===a.name;});
  d.innerHTML='<div style="display:grid;grid-template-columns:200px 1fr;gap:16px;">'+
    '<div>'+
      '<div class="card" style="text-align:center;margin-bottom:12px;">'+
        '<div class="av" style="background:'+a.color+';width:48px;height:48px;font-size:18px;margin:0 auto 10px;">'+a.letter+'</div>'+
        '<div style="font-size:15px;font-weight:700;color:#0d1018;">'+a.name+'</div>'+
        '<div style="font-size:32px;font-weight:700;color:#0d1018;margin:8px 0 2px;">'+a.score+'</div>'+
        '<div style="font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em;">Score total</div>'+
      '</div>'+
      '<div class="card">'+
        [['Llamadas',a.calls,''],['POs',a.pos,''],['AHT',a.aht,''],['Satisfacción',a.sat,'%'],['Speech',a.speech,'%']].map(function(m){
          return'<div style="display:flex;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.05);"><span style="flex:1;font-size:12px;color:#6b7280;">'+m[0]+'</span><span style="font-size:12px;font-weight:600;color:#0d1018;">'+m[1]+m[2]+'</span></div>';
        }).join('')+
      '</div>'+
    '</div>'+
    '<div>'+
      '<div class="card">'+
        '<div style="font-size:13px;font-weight:600;color:#0d1018;margin-bottom:10px;">Observaciones</div>'+
        (af.length?af.map(function(f){
          var pc=f.priority==='alta'?'#cc7580':f.priority==='media'?'#bf9455':'#6aaa90';
          return'<div style="padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05);">'+
            '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">'+
              '<div style="width:7px;height:7px;border-radius:50%;background:'+pc+';flex-shrink:0;"></div>'+
              '<span style="font-size:10px;color:#9ca3af;">'+f.by+' · '+f.role+' · '+f.date+'</span>'+
              '<span style="margin-left:auto;font-size:9px;padding:1px 7px;border-radius:20px;background:rgba(0,0,0,.04);color:'+pc+';border:1px solid '+pc+';">'+f.priority+'</span>'+
            '</div>'+
            '<div style="font-size:12px;color:#374151;line-height:1.6;">'+f.text+'</div>'+
          '</div>';
        }).join(''):'<div style="font-size:12px;color:#9ca3af;">Sin observaciones registradas.</div>')+
      '</div>'+
      (ap?'<div class="card" style="margin-top:12px;">'+
        '<div style="font-size:13px;font-weight:600;color:#0d1018;margin-bottom:8px;">Plan de coaching</div>'+
        '<div style="font-size:12px;color:#374151;margin-bottom:8px;">🎯 '+ap.obj+'</div>'+
        '<div class="plan-bar"><div class="plan-bar-fill" style="width:'+ap.pct+'%;background:'+(ap.pct>=70?'#6aaa90':ap.pct>=40?'#bf9455':'#cc7580')+'"></div></div>'+
        '<div style="font-size:11px;color:#9ca3af;margin-top:4px;">'+ap.pct+'% completado · '+ap.coach+' · '+ap.dl+'</div>'+
      '</div>':'<div class="card" style="margin-top:12px;text-align:center;font-size:12px;color:#9ca3af;">Sin plan activo ✓</div>')+
    '</div>'+
  '</div>';
}

function viewFeedback(){
  return'<div class="sec-title">Observaciones recibidas</div>'+
  RF.map(function(f){
    var pc=f.priority==='alta'?'#cc7580':f.priority==='media'?'#bf9455':'#6aaa90';
    var a=RA.find(function(x){return x.name===f.agent;})||{color:'#9ca3af',letter:'?'};
    return'<div class="card">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">'+
        '<div class="av" style="background:'+a.color+';">'+a.letter+'</div>'+
        '<div><div style="font-size:13px;font-weight:600;color:#0d1018;">'+f.agent+'</div><div style="font-size:11px;color:#9ca3af;">'+f.by+' · '+f.role+' · '+f.date+'</div></div>'+
        '<span class="tag" style="margin-left:auto;color:'+pc+';border-color:'+pc+';background:rgba(0,0,0,.02);">'+f.priority.toUpperCase()+'</span>'+
      '</div>'+
      '<div style="font-size:12px;color:#374151;line-height:1.6;margin-bottom:8px;">'+f.text+'</div>'+
      '<div>'+f.tags.map(function(t){return'<span class="tag" style="color:#6b7280;border-color:rgba(0,0,0,.1);background:rgba(0,0,0,.02);margin-right:5px;">'+t+'</span>';}).join('')+'</div>'+
    '</div>';
  }).join('');
}

function viewCoaching(){
  return RC.map(function(p){
    var col=p.pct>=70?'#6aaa90':p.pct>=40?'#bf9455':'#cc7580';
    var a=RA.find(function(x){return x.name===p.agent;})||{color:'#9ca3af',letter:'?'};
    return'<div class="plan-card">'+
      '<div class="plan-header">'+
        '<div class="av" style="background:'+a.color+';">'+a.letter+'</div>'+
        '<div><div style="font-size:13px;font-weight:600;color:#0d1018;">'+p.agent+'</div><div style="font-size:11px;color:#9ca3af;">Coach: '+p.coach+' · Plazo: '+p.dl+'</div></div>'+
        '<div class="plan-pct" style="color:'+col+';">'+p.pct+'%</div>'+
      '</div>'+
      '<div style="font-size:13px;font-weight:600;color:#0d1018;margin-bottom:8px;">🎯 '+p.obj+'</div>'+
      '<div class="plan-bar"><div class="plan-bar-fill" style="width:'+p.pct+'%;background:'+col+'"></div></div>'+
      '<div style="margin-top:10px;">'+p.acts.map(function(ac){return'<div class="plan-act">'+ac+'</div>';}).join('')+'</div>'+
    '</div>';
  }).join('');
}

showView('resumen');
</script>

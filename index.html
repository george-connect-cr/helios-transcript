<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta http-equiv="cache-control" content="no-cache, no-store"/>
<title>CONNECT · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/login.css">
<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="assets/js/auth.js"></script>
<script>
  // Check if already authenticated — redirect to app
  window.addEventListener('DOMContentLoaded', () => {
    const s = AUTH.getSession();
    if (s) { window.location.href = 'app.html'; return; }

    // Show timeout notice if redirected due to inactivity
    const params = new URLSearchParams(window.location.search);
    if (params.get('reason') === 'timeout') {
      document.getElementById('timeout-notice').style.display = 'block';
    }
  });
</script>
</head>
<body>

<div class="login-wrap">
  <!-- Logo -->
  <div class="login-logo">
    <span class="login-logo-word">Connect</span>
    <span class="login-logo-reg">®</span>
  </div>

  <!-- Timeout notice -->
  <div class="login-timeout-notice" id="timeout-notice">
    ⏱ Tu sesión se cerró por inactividad. Vuelve a iniciar sesión.
  </div>

  <!-- Title -->
  <div class="login-title">Bienvenido al agente</div>
  <div class="login-sub">
    Inicia sesión con tu cuenta corporativa<br>
    <span>@connect.inc</span> para continuar.
  </div>

  <div class="login-divider">
    <div class="login-divider-line"></div>
    <div class="login-divider-txt">Acceso corporativo</div>
    <div class="login-divider-line"></div>
  </div>

  <!-- Google Sign-In button -->
  <div class="g-signin-wrap">
    <div id="g_id_onload"
      data-client_id="YOUR_GOOGLE_CLIENT_ID"
      data-callback="onGoogleSignIn"
      data-auto_select="false"
      data-itp_support="true"
      data-hd="connect.inc">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-size="large"
      data-theme="outline"
      data-text="signin_with"
      data-shape="pill"
      data-logo_alignment="left"
      data-width="280">
    </div>
  </div>

  <!-- Error message -->
  <div class="login-error" id="auth-error"></div>

  <div class="login-footer">
    Solo cuentas <strong>@connect.inc</strong> tienen acceso.<br>
    <a href="mailto:soporte@connect.inc">¿Problemas? Contactar soporte</a>
  </div>
</div>

<script>
  function onGoogleSignIn(response) {
    AUTH.handleCredential(response);
  }
</script>
</body>
</html>

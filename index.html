<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="cache-control" content="no-cache, no-store"/>
<title>CONNECT Academy · Acceso</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:#f8f9fc;color:#0d0f1a;}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.card{
  background:#fff;border-radius:6px;padding:52px 48px;
  width:100%;max-width:440px;
  box-shadow:0 1px 3px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.05);
}
.brand{text-align:center;margin-bottom:40px;}
.brand-name{font-size:30px;font-weight:800;letter-spacing:-1px;color:#0d0f1a;}
.brand-name em{color:#e04500;font-style:normal;}
.brand-name sup{font-size:11px;color:#e04500;opacity:.5;}
.brand-sub{font-size:9px;font-weight:700;letter-spacing:.22em;color:#c4c8dc;text-transform:uppercase;margin-top:5px;}
.brand-rule{width:28px;height:1px;background:rgba(0,0,0,.06);margin:14px auto 0;}

/* Form */
.form{display:flex;flex-direction:column;gap:16px;}
.field{display:flex;flex-direction:column;gap:5px;}
.lbl{font-size:11px;font-weight:600;color:#3a4060;}
.input{
  width:100%;height:40px;border:none;border-radius:4px;
  padding:0 12px;font-size:13px;color:#0d0f1a;
  background:#f8f9fc;outline:none;font-family:inherit;
  transition:box-shadow .14s;
}
.input:focus{background:#fff;box-shadow:0 0 0 2px rgba(59,110,248,.12);}
.input::placeholder{color:#c4c8dc;}
.pwd-wrap{position:relative;}
.pwd-wrap .input{padding-right:58px;}
.pwd-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  font-size:11px;font-weight:600;color:#8892b0;cursor:pointer;user-select:none;
}
.pwd-toggle:hover{color:#3a4060;}
.btn-primary{
  width:100%;height:40px;border-radius:4px;border:none;
  background:#e04500;color:#fff;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;letter-spacing:.2px;
  transition:background .15s;margin-top:2px;
  box-shadow:0 3px 10px rgba(224,69,0,.2);
}
.btn-primary:hover{background:#c93d00;}
.sep{display:flex;align-items:center;gap:10px;}
.sep-line{flex:1;height:0.5px;background:rgba(0,0,0,.06);}
.sep-txt{font-size:11px;color:#c4c8dc;font-weight:500;}
.btn-google{
  width:100%;height:40px;border-radius:4px;border:none;
  background:#f8f9fc;display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:13px;font-weight:600;color:#3a4060;cursor:pointer;font-family:inherit;
  transition:all .14s;box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.btn-google:hover{background:#f1f3f9;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.footer{text-align:center;font-size:11px;color:#c4c8dc;margin-top:32px;line-height:1.8;}
.footer a{color:#3b6ef8;text-decoration:none;font-weight:600;}
.footer a:hover{text-decoration:underline;}
.footer strong{color:#3a4060;}

/* Extension popup */
.ext-ov{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:100;display:flex;align-items:center;justify-content:center;}
.ext-card{
  background:#fff;border-radius:6px;padding:36px 40px;width:360px;max-width:94vw;
  box-shadow:0 4px 24px rgba(0,0,0,.12);text-align:center;
}
.ext-logo{height:48px;width:auto;margin:0 auto 20px;}
.ext-title{font-size:15px;font-weight:700;color:#0d0f1a;margin-bottom:6px;}
.ext-sub{font-size:12px;color:#8892b0;margin-bottom:20px;}
.ext-input{
  width:100%;height:40px;border:none;border-radius:4px;
  background:#f8f9fc;font-size:15px;font-weight:700;
  text-align:center;letter-spacing:.1em;color:#0d0f1a;
  outline:none;font-family:inherit;margin-bottom:16px;
  transition:box-shadow .14s;
}
.ext-input:focus{background:#fff;box-shadow:0 0 0 2px rgba(59,110,248,.12);}
.ext-btn{
  width:100%;height:40px;border:none;border-radius:4px;
  background:#e04500;color:#fff;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;
  box-shadow:0 3px 10px rgba(224,69,0,.2);transition:background .15s;
}
.ext-btn:hover{background:#c93d00;}

</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">
      <div class="brand-name"><em>CONNECT</em><sup>®</sup></div>
      <div class="brand-sub">Academy</div>
      <div class="brand-rule"></div>
    </div>
    <div class="form">
      <div class="field">
        <div class="lbl">Correo corporativo</div>
        <input class="input" type="email" id="login-email" placeholder="nombre@connect.inc">
      </div>
      <div class="field">
        <div class="lbl">Contraseña</div>
        <div class="pwd-wrap">
          <input class="input" type="password" id="login-pwd" placeholder="••••••••">
          <span class="pwd-toggle" onclick="togglePwd(this)">Mostrar</span>
        </div>
      </div>
      <button class="btn-primary" onclick="doLogin()">Iniciar sesión</button>
      <div class="sep"><div class="sep-line"></div><span class="sep-txt">o continúa con</span><div class="sep-line"></div></div>
      <button class="btn-google" onclick="doLoginGoogle()">
        <svg width="16" height="16" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
      </button>
    </div>
    <div class="footer">
      <a href="#">¿Olvidaste tu contraseña?</a><br>
      Acceso restringido a cuentas <strong>@connect.inc</strong>
    </div>
  </div>
</div>
<script>

var USERS = {
  admin:      [{name:'George Esna',     email:'george.esna@connect.inc',     color:'#6366f1', letter:'G'},
               {name:'María Torres',    email:'maria.torres@connect.inc',     color:'#8b5cf6', letter:'M'}],
  supervisor: [{name:'Ana Vega',        email:'ana.vega@connect.inc',         color:'#bf9455', letter:'A'},
               {name:'Roberto Salas',   email:'roberto.salas@connect.inc',    color:'#a67c45', letter:'R'}],
  agente:     [{name:'Dayana García',   email:'dayana.garcia@connect.inc',    color:'#ff5c00', letter:'D'},
               {name:'Carlos Mora',     email:'carlos.mora@connect.inc',      color:'#6aaa90', letter:'C'},
               {name:'Valeria Núñez',   email:'valeria.nunez@connect.inc',    color:'#cc7580', letter:'V'},
               {name:'Luis Arias',      email:'luis.arias@connect.inc',       color:'#4a8a72', letter:'L'}],
  formador:   [{name:'Laura Méndez',    email:'laura.mendez@connect.inc',     color:'#6366f1', letter:'L'},
               {name:'Andrés Campos',   email:'andres.campos@connect.inc',    color:'#8b5cf6', letter:'A'}],
  demo:       [{name:'Usuario Demo',    email:'demo@connect.inc',             color:'#9ca3af', letter:'D'}]
};
var ROLE_LABELS = {admin:'Administrador',supervisor:'Supervisor',agente:'Agente',formador:'Formador',demo:'Demo'};
var ROLE_COLORS = {
  admin:      {bg:'rgba(99,102,241,.1)',color:'#6366f1',border:'rgba(99,102,241,.2)'},
  supervisor: {bg:'rgba(191,148,85,.1)',color:'#a67c45',border:'rgba(191,148,85,.2)'},
  agente:     {bg:'rgba(106,170,144,.1)',color:'#4a8a72',border:'rgba(106,170,144,.2)'},
  formador:   {bg:'rgba(99,102,241,.1)', color:'#6366f1',border:'rgba(99,102,241,.2)'},
  demo:       {bg:'rgba(156,163,175,.1)',color:'#6b7280',border:'rgba(156,163,175,.2)'}
};
var selectedRole = null;

window.addEventListener('DOMContentLoaded',function(){
  var s=localStorage.getItem('helios_session');
  if(s){try{var p=JSON.parse(s);if(p&&(Date.now()-p.ts<3600000)){window.location.href='app.html';return;}}catch{}}
  var params=new URLSearchParams(window.location.search);
  if(params.get('reason')==='timeout') document.getElementById('timeout').style.display='block';
});

function showRoles(){
  document.getElementById('step1').style.display='none';
  document.getElementById('step2').style.display='block';
}
function selectRole(role){
  selectedRole=role;
  document.querySelectorAll('.role-card').forEach(function(c){c.classList.remove('selected');});
  document.getElementById('rc-'+role).classList.add('selected');
  document.getElementById('next-btn').disabled=false;
}
function showUsers(){
  if(!selectedRole)return;
  document.getElementById('step2').style.display='none';
  var s3=document.getElementById('step3');
  s3.style.display='block';
  document.getElementById('role-lbl').textContent=ROLE_LABELS[selectedRole];
  var rc=ROLE_COLORS[selectedRole];
  document.getElementById('role-lbl').style.cssText='font-weight:600;padding:1px 8px;border-radius:20px;background:'+rc.bg+';color:'+rc.color+';border:1px solid '+rc.border+';font-size:10px;font-family:monospace;';
  var list=document.getElementById('users-list');
  list.style.display='flex';
  list.innerHTML='';
  (USERS[selectedRole]||[]).forEach(function(u){
    var div=document.createElement('div');
    div.className='user';
    div.onclick=function(){loginAs(u,selectedRole);};
    var rc=ROLE_COLORS[selectedRole];
    div.innerHTML='<div class="av" style="background:'+u.color+'">'+u.letter+'</div>'+
      '<div style="flex:1"><div class="uname">'+u.name+'</div><div class="uemail">'+u.email+'</div></div>'+
      '<div class="urole" style="background:'+rc.bg+';color:'+rc.color+';border:1px solid '+rc.border+'">'+ROLE_LABELS[selectedRole]+'</div>';
    list.appendChild(div);
  });
}
function backTo(show,hide){
  document.getElementById(show).style.display='block';
  document.getElementById(hide).style.display='none';
}
function loginAs(user,role){
  if(role==='agente'){
    showExtensionPopup(user,role);
    return;
  }
  _doLogin(user,role,null);
}

  var lbl=document.createElement('div');lbl.style.cssText='font-size:11px;font-weight:600;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;text-align:left;';lbl.textContent='Extensión';
  var inp=document.createElement('input');
  inp.type='tel';inp.placeholder='Ej: 1023';inp.maxLength=6;
  inp.style.cssText='width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #e5e7eb;font-size:22px;text-align:center;letter-spacing:.15em;color:#111318;outline:none;box-sizing:border-box;';
  inp.addEventListener('input',function(){this.value=this.value.replace(/[^0-9]/g,'');});
  inp.addEventListener('focus',function(){this.style.borderColor='#E8440A';});
  inp.addEventListener('blur',function(){this.style.borderColor='#e5e7eb';});
  var err=document.createElement('div');err.style.cssText='font-size:11px;color:#C0566A;margin:5px 0 0;min-height:16px;text-align:left;';
  var btnOk=document.createElement('button');
  btnOk.style.cssText='width:100%;padding:13px;border-radius:10px;border:none;background:#E8440A;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px;';
  btnOk.textContent='Conectar';
  var btnNo=document.createElement('button');
  btnNo.style.cssText='width:100%;padding:10px;border-radius:10px;border:1px solid #e5e7eb;background:transparent;color:#6b7280;font-size:13px;cursor:pointer;margin-top:8px;';
  btnNo.textContent='Cancelar';
  btnNo.onclick=function(){ov.remove();};
  function doConn(){
    var val=inp.value.trim();
    if(val.length<3){err.textContent='Ingresa mínimo 3 dígitos';inp.focus();return;}
    err.textContent='';btnOk.textContent='Conectando...';btnOk.disabled=true;btnOk.style.opacity='0.7';
    setTimeout(function(){ov.remove();_doLogin(user,role,val);},900);
  }
  btnOk.onclick=doConn;
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')doConn();});
  [ico,ttl,sub,lbl,inp,err,btnOk,btnNo].forEach(function(el){card.appendChild(el);});
  ov.appendChild(card);document.body.appendChild(ov);
  setTimeout(function(){inp.focus();},100);
}

function _connectAudara(userName,role){
  var ext=document.getElementById('ext-input');
  var err=document.getElementById('ext-error');
  if(!ext||ext.value.length<3){if(err)err.style.display='block';return;}
  if(err)err.style.display='none';
  var extNum=ext.value;
  // Find user object
  var allUsers=[];
  USERS.forEach(function(u){allUsers=allUsers.concat(u.users);});
  var user=allUsers.find(function(u){return u.name===userName;})||{name:userName,email:'',color:'#ff5c00',letter:userName[0]};
  // Store extension
  var overlay=document.getElementById('ext-overlay');
  if(overlay){
    var btn=overlay.querySelector('button');
    if(btn){btn.textContent='Conectando...';btn.disabled=true;}
  }
  setTimeout(function(){
    if(overlay)overlay.remove();
    _doLogin(user,role,extNum);
  },900);
}

function _doLogin(user,role,extension){
  document.getElementById('step3').style.display='none';
  document.getElementById('loading').style.display='flex';
  setTimeout(function(){
    var session={user:{name:user.name,email:user.email,color:user.color,letter:user.letter,role:role,extension:extension},ts:Date.now()};
    localStorage.setItem('helios_session',JSON.stringify(session));
    window.location.href='app.html';
  },1100);
}

function togglePwd(el){
  var i=document.getElementById('login-pwd');
  if(i.type==='password'){i.type='text';el.textContent='Ocultar';}
  else{i.type='password';el.textContent='Mostrar';}
}
function doLogin(){
  var email=document.getElementById('login-email').value||'';
  var role='agente';
  if(email.includes('admin'))role='admin';
  else if(email.includes('supervisor'))role='supervisor';
  else if(email.includes('formador'))role='formador';
  else if(email.includes('demo'))role='demo';
  var user={name:email.split('@')[0]||'Usuario',email:email,role:role};
  if(role==='agente'||role==='demo'){showExtensionPopup(user,role);}
  else{_doLogin(user,role,null);}
}
function doLoginGoogle(){
  // SSO demo — treat as agente
  var user={name:'Demo Google',email:'demo@connect.inc',role:'demo'};
  _doLogin(user,'demo',null);
}

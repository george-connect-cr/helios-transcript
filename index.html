<title>KAI Academy · Acceso</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --s0:#fff;--s1:#f8f9fc;--s2:#f1f3f9;
  --sh:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.04);
  --sh-sm:0 1px 4px rgba(0,0,0,.06);
  --t0:#0d0f1a;--t1:#3a4060;--t2:#8892b0;--t3:#c4c8dc;
  --acc:#c8562a;--blue:#3b6ef8;
  --g:#0ea874;--r:#e84040;
  --gr2:#edfaf4;--bl2:#eff3ff;--pu2:#f3f0ff;--am2:#fff8ed;--re2:#fff3f3;
  --f:'Geist','Inter',system-ui,sans-serif;
  --r4:10px;--r6:16px;
}
html,body{height:100%;font-family:var(--f);background:#f0f2f7;color:var(--t0);}

/* ── LAYOUT ── */
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px;}
.card{
  display:flex;background:#fff;border-radius:20px;
  width:100%;max-width:860px;min-height:480px;
  box-shadow:0 20px 60px rgba(0,0,0,.1),0 4px 16px rgba(0,0,0,.06);
  overflow:hidden;border:none;padding:0;
}
.card-left{
  width:500px;min-width:500px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:52px 24px;background:#fff;
}
.card-right{
  flex:1;background:#ffffff;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}







@media(max-width:640px){.card-right{display:none;}.card-left{width:100%;}}

/* ── BRAND ── */
.brand{text-align:center;margin-bottom:28px;}
.brand-name{font-size:30px;font-weight:800;letter-spacing:-1px;color:var(--t0);}
.brand-name em{color:var(--acc);font-style:normal;}
.brand-name sup{font-size:10px;color:var(--acc);opacity:.5;}
.brand-sub{font-size:9px;font-weight:700;letter-spacing:.22em;color:var(--t3);text-transform:uppercase;margin-top:5px;}
.brand-rule{width:28px;height:1px;background:rgba(0,0,0,.06);margin:12px auto 0;}

/* ── FORM ── */
.form{display:flex;flex-direction:column;gap:14px;}
.field{display:flex;flex-direction:column;gap:5px;}
.lbl{font-size:11px;font-weight:600;color:var(--t1);}
.input{
  width:100%;height:44px;border:1.5px solid rgba(0,0,0,.07);border-radius:12px;
  padding:0 14px;font-size:13px;color:var(--t0);
  background:rgba(248,249,252,.8);outline:none;font-family:var(--f);
  transition:border-color .14s,box-shadow .14s;
}
.input:focus{background:#fff;border-color:rgba(59,110,248,.3);box-shadow:0 0 0 3px rgba(59,110,248,.08);}
.input::placeholder{color:var(--t3);}
.pwd-wrap{position:relative;}
.pwd-wrap .input{padding-right:58px;}
.pwd-toggle{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;user-select:none;
}
.pwd-toggle:hover{color:var(--t1);}
.btn-primary{
  width:100%;height:44px;border-radius:12px;border:none;
  background:var(--acc);color:#fff;font-size:13px;font-weight:700;
  cursor:pointer;font-family:var(--f);letter-spacing:.2px;
  transition:background .15s,transform .1s;box-shadow:0 4px 14px rgba(232,93,32,.22);
}
.btn-primary:hover{background:#d14d15;}
.btn-primary:active{transform:scale(.99);}
.sep{display:flex;align-items:center;gap:10px;}
.sep-line{flex:1;height:0.5px;background:rgba(0,0,0,.06);}
.sep-txt{font-size:11px;color:var(--t3);font-weight:500;}
.btn-google{
  width:100%;height:52px;border-radius:100px;
  border:1.5px solid rgba(0,0,0,.12);
  background:#fff;display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:15px;font-weight:500;color:var(--t0);cursor:pointer;font-family:var(--f);
  transition:all .14s;box-shadow:0 1px 6px rgba(0,0,0,.06);
  margin-top:12px;padding:0 28px;
}
.btn-google:hover{background:#f8f8f8;box-shadow:0 2px 10px rgba(0,0,0,.1);border-color:rgba(0,0,0,.18);}
.footer-txt{text-align:center;font-size:11px;color:var(--t3);margin-top:28px;line-height:1.8;}
.footer-txt a{color:var(--blue);text-decoration:none;font-weight:600;}
.footer-txt strong{color:var(--t1);}

/* ── OVERLAY BASE ── */
.ov{
  position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn .18s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ov-card{
  background:var(--s0);border-radius:var(--r6);
  box-shadow:0 4px 24px rgba(0,0,0,.14);
  width:100%;animation:slideUp .2s ease;
}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── ROLE SELECTOR ── */
.role-card{max-width:520px;}
.role-hdr{padding:24px 28px 0;}
.role-hdr h2{font-size:16px;font-weight:700;color:var(--t0);margin-bottom:4px;}
.role-hdr p{font-size:12px;color:var(--t2);}
.role-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:20px 28px;}
.rc{
  background:var(--s1);border-radius:var(--r4);padding:16px 8px 12px;
  text-align:center;cursor:pointer;transition:all .15s;
}
.rc:hover{background:var(--s2);transform:translateY(-1px);box-shadow:var(--sh-sm);}
.rc.sel{background:var(--s0);box-shadow:0 0 0 2px var(--acc),var(--sh-sm);}
.rc-av{
  width:38px;height:38px;border-radius:var(--r4);
  margin:0 auto 8px;display:flex;align-items:center;
  justify-content:center;font-size:17px;
}
.rc-av.bl{background:var(--bl2);}
.rc-av.pu{background:var(--pu2);}
.rc-av.am{background:var(--am2);}
.rc-av.re{background:var(--re2);}
.rc-av.gr{background:var(--gr2);}
.rc-name{font-size:11px;font-weight:700;color:var(--t0);}
.rc-sub{font-size:9px;color:var(--t2);margin-top:2px;}
.role-footer{
  padding:16px 28px;border-top:0.5px solid rgba(0,0,0,.05);
  display:flex;gap:8px;justify-content:flex-end;
}

/* ── USER SELECTOR ── */
.user-card{max-width:420px;}
.user-hdr{
  padding:20px 24px;border-bottom:0.5px solid rgba(0,0,0,.05);
  display:flex;align-items:center;gap:10px;
}
.user-hdr h2{font-size:14px;font-weight:700;color:var(--t0);flex:1;}
.back-btn{
  height:30px;padding:0 12px;border-radius:var(--r4);border:none;
  background:var(--s1);font-size:11px;font-weight:600;
  color:var(--t1);cursor:pointer;font-family:var(--f);
}
.back-btn:hover{background:var(--s2);}
.role-badge{
  font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;
  background:#fff8f5;color:var(--acc);
}
.user-list{padding:8px;}
.user-item{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-radius:var(--r4);cursor:pointer;transition:background .12s;
}
.user-item:hover{background:var(--s1);}
.user-av{
  width:34px;height:34px;border-radius:var(--r4);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;
}
.user-name{font-size:13px;font-weight:600;color:var(--t0);}
.user-email{font-size:10px;color:var(--t2);margin-top:1px;}

/* ── EXTENSION POPUP ── */
.ext-card{max-width:380px;padding:32px 28px;text-align:center;}
.ext-logo{font-size:32px;margin-bottom:14px;}
.ext-title{font-size:15px;font-weight:700;color:var(--t0);margin-bottom:5px;}
.ext-sub{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:24px;}
.ext-input{
  width:100%;height:48px;border:none;border-radius:var(--r4);
  background:var(--s1);font-size:24px;font-weight:700;
  text-align:center;letter-spacing:.15em;color:var(--t0);
  outline:none;font-family:'JetBrains Mono',monospace;
  transition:box-shadow .14s;margin-bottom:6px;
}
.ext-input:focus{background:var(--s0);box-shadow:0 0 0 2px rgba(59,110,248,.12);}
.ext-err{font-size:11px;color:var(--r);min-height:16px;margin-bottom:12px;}
.ext-btns{display:flex;flex-direction:column;gap:8px;}

/* ── LOADING ── */
.loading-ov{
  position:fixed;inset:0;background:var(--s0);z-index:200;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.loading-ov.show{display:flex;}
.spinner{
  width:32px;height:32px;border:3px solid var(--s2);
  border-top-color:var(--acc);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;font-weight:600;color:var(--t2);}

/* ── SHARED BUTTONS ── */
.btn-outline{
  height:38px;padding:0 18px;border-radius:var(--r4);border:none;
  background:var(--s1);font-size:12px;font-weight:600;
  color:var(--t1);cursor:pointer;font-family:var(--f);
  transition:all .12s;
}
.btn-outline:hover{background:var(--s2);}
.btn-cta{
  height:38px;padding:0 20px;border-radius:var(--r4);border:none;
  background:var(--acc);color:#fff;font-size:12px;font-weight:700;
  cursor:pointer;font-family:var(--f);letter-spacing:.2px;
  box-shadow:0 3px 10px rgba(224,69,0,.2);transition:background .15s;
}
.btn-cta:hover{background:#c93d00;}
.btn-cta:disabled{opacity:.5;cursor:not-allowed;}

  * { margin: 0; padding: 0; box-sizing: border-box; }
  .agent-scene {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ffffff;
  }
  .agent-img {
    position: absolute;
    z-index: 2;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 28%;
    display: block;
    filter: saturate(0.06) brightness(1.01);
  }

  /* ── PANTALLA MONITOR ──
     El borde derecho del monitor está ~15-18% x, 32-68% y.
     El glow queda PEGADO al monitor, no se extiende hacia la cara.
     overflow:hidden en .agent-scene lo recorta si se pasa.
  */
  .screen-glow {
    position: absolute;
    left: 0%;
    top: 30%;
    width: 18%;       /* tope justo en el borde del monitor */
    height: 40%;
    z-index: 1;
    pointer-events: none;
    /* glow hacia la DERECHA pegado al monitor */
    background: radial-gradient(ellipse at 100% 50%,
      #d95a30 0%,
      #e87555 20%,
      #f5c4b0 42%,
      transparent 70%
    );
    animation: screenFlicker 3s ease-in-out infinite;
  }

  @keyframes screenFlicker {
    0%,100% { opacity: 0.22; }
    20%      { opacity: 0.40; }
    45%      { opacity: 0.14; }
    65%      { opacity: 0.44; }
    80%      { opacity: 0.24; }
  }

  /* ── AURICULAR NARANJA ──
     Píxeles naranjas: 67-69% x, 20-28% y  →  centro ~68% x, 24% y
  */
  .mic-glow {
    position: absolute;
    left: 68%;
    top: 24%;
    width: 52px;
    height: 52px;
    z-index: 3;
    pointer-events: none;
    background: radial-gradient(circle, #d95a30 0%, #e87555 30%, transparent 70%);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: micPulse 1.6s ease-in-out infinite;
  }

  @keyframes micPulse {
    0%,100% { opacity: 0.55; transform: translate(-50%,-50%) scale(1);   }
    50%      { opacity: 1.00; transform: translate(-50%,-50%) scale(1.55); }
  }

  /* ── LÍNEAS DE VOZ ──
     Las líneas curvas (3 arcos) están ~28-37% x, 38-50% y
     Son arcos abiertos hacia la izquierda (border-left)
  */
  .voice-line {
    position: absolute;
    z-index: 3;
    pointer-events: none;
    border-left: 2.5px solid #d95a30;
    border-top: 2.5px solid transparent;
    border-bottom: 2.5px solid transparent;
    border-radius: 50%;
    opacity: 0;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 0 4px rgba(217,90,48,.55));
  }
  /* línea más cercana — pequeña, más a la derecha */
  .vl-1 {
    left: 35%;
    top: 44%;
    width: 11px;
    height: 20px;
    animation: voiceLine 2.2s ease-out infinite 0s;
  }
  /* línea media */
  .vl-2 {
    left: 31%;
    top: 44%;
    width: 19px;
    height: 34px;
    animation: voiceLine 2.2s ease-out infinite 0.5s;
  }
  /* línea más lejana — grande, más a la izquierda */
  .vl-3 {
    left: 27%;
    top: 44%;
    width: 27px;
    height: 48px;
    animation: voiceLine 2.2s ease-out infinite 1.0s;
  }

  @keyframes voiceLine {
    0%   { opacity: 0;   transform: translate(-50%,-50%) scale(0.7); }
    20%  { opacity: 0.9; }
    70%  { opacity: 0.5; }
    100% { opacity: 0;   transform: translate(-50%,-50%) scale(1.1); }
  }



/* ── Popup ayuda KAI ── */
.help-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1000;align-items:center;justify-content:center;}
.help-overlay.open{display:flex;}
.help-popup{
  background:#fff;border-radius:20px;padding:32px 28px;max-width:340px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.15);text-align:center;position:relative;
  animation:popIn .2s ease;
}
@keyframes popIn{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
.help-kai-icon{
  width:52px;height:52px;border-radius:50%;background:#e8522a;
  display:flex;align-items:center;justify-content:center;margin:0 auto 12px;
}
.help-kai-icon svg{width:28px;height:28px;fill:#fff;}
.help-bulb{font-size:28px;margin-bottom:8px;}
.help-title{font-size:14px;font-weight:500;color:var(--t0);margin-bottom:8px;}
.help-msg{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:20px;}
.help-close{
  width:100%;height:40px;border-radius:100px;border:1.5px solid rgba(0,0,0,.12);
  background:#fff;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;
  font-family:var(--f);transition:all .12s;
}
.help-close:hover{background:#f4f4f4;}

    .then(function(result) {
      var fbUser = result.user;
      var email  = fbUser.email || '';
      var domain = email.split('@')[1] || '';

      // ── Validación real de dominio ─────────────────────────────
      // hd es solo un hint — la verificación debe hacerse aquí
      if (domain !== 'connect.inc') {
        firebase.auth().signOut();
        _showLoginErr('Esta cuenta no tiene acceso. Comunicate con el administrador del sitio para solicitar acceso.');
        return;
      }

      _lookupAgentInSupabase(email, fbUser.displayName, fbUser.uid);
    })
    .catch(function(err) {
      var msg = err.code === 'auth/popup-closed-by-user'
        ? 'Ventana cerrada antes de completar el ingreso.'
        : err.code === 'auth/unauthorized-domain'
        ? 'Dominio no autorizado. Contactá al administrador.'
        : 'Error al ingresar con Google: ' + err.message;
      _showLoginErr(msg);
    });
}

function _lookupAgentInSupabase(email, displayName, firebaseUid) {
  document.getElementById('loading').classList.add('show');
  var name   = displayName || email.split('@')[0].replace(/\./g,' ').replace(/\b\w/g, function(c){return c.toUpperCase();});
  var letter = name[0].toUpperCase();
  var sbHdrs = { 'apikey': _SB_KEY2, 'Authorization': 'Bearer ' + _SB_KEY2 };

  fetch(_SB_URL2 + '/rest/v1/agents?email=eq.' + encodeURIComponent(email) + '&select=*', {
    headers: sbHdrs
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    var agent = data && data.length ? data[0] : null;
    if (!agent) {
      // Primer login — crear agente con rol 'agente' por defecto
      return fetch(_SB_URL2 + '/rest/v1/agents', {
        method: 'POST',
        headers: Object.assign({'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=representation'}, sbHdrs),
        body: JSON.stringify({ email: email, name: name, role: 'agente', firebase_uid: firebaseUid })
      })
      .then(function(r){ return r.json(); })
      .then(function(d){ return Array.isArray(d) ? d[0] : d; });
    }
    // Sincronizar firebase_uid si cambió o no estaba
    if (firebaseUid && agent.firebase_uid !== firebaseUid) {
      fetch(_SB_URL2 + '/rest/v1/agents?email=eq.' + encodeURIComponent(email), {
        method: 'PATCH',
        headers: Object.assign({'Content-Type':'application/json','Prefer':'return=minimal'}, sbHdrs),
        body: JSON.stringify({ firebase_uid: firebaseUid, updated_at: new Date().toISOString() })
      }).catch(function(){});
    }
    return agent;
  })
  .then(function(agent){
    document.getElementById('loading').classList.remove('show');
    var userObj = {
      name:         agent.name        || name,
      email:        agent.email       || email,
      firebase_uid: firebaseUid       || agent.firebase_uid || '',
      color:        '#e04500',
      letter:       (agent.name || name)[0].toUpperCase(),
      role:         agent.role        || 'agente',
      country:      agent.country     || 'Costa Rica',
      lane:         agent.lane        || 'Home'
    };
    if (agent.role === 'agente' || agent.role === 'demo') {
      saveAndRedirect(userObj, agent.role, null);
    } else {
      saveAndRedirect(userObj, agent.role, null);
    }
  })
  .catch(function(err){
    document.getElementById('loading').classList.remove('show');
    _showLoginErr('No se pudo verificar tu cuenta. Intentá de nuevo.');
    console.error('[SSO Supabase]', err);
  });
}

function _showLoginErr(msg) {
  var existing = document.getElementById('login-err');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.id = 'login-err';
  el.style.cssText = 'background:#fff3f3;color:#e84040;padding:9px 14px;border-radius:6px;font-size:12px;font-weight:600;margin-top:8px;text-align:center;';
  el.textContent = msg;
  var form = document.querySelector('.form');
  if (form) form.appendChild(el);
  setTimeout(function(){ el.remove(); }, 5000);
}


/* ── STEP 2: Role selector popup ── */
function showRoleSelector(user){
  var ov = document.createElement('div');
  ov.className = 'ov';
  ov.id = 'role-ov';

  var roles = [
    {key:'agente',    icon:'🎯', av:'bl', sub:'Atención'},
    {key:'formador',  icon:'📋', av:'pu', sub:'Coaching'},
    {key:'supervisor',icon:'📊', av:'am', sub:'Equipo'},
    {key:'admin',     icon:'⚙️', av:'re', sub:'Total'},
    {key:'demo',      icon:'🎬', av:'gr', sub:'Preview'}
  ];

  var cards = roles.map(function(r){
    return '<div class="rc" id="rc-'+r.key+'" onclick="selectRole(\''+r.key+'\')" role="button">'+
      '<div class="rc-av '+r.av+'">'+r.icon+'</div>'+
      '<div class="rc-name">'+ROLE_LABELS[r.key]+'</div>'+
      '<div class="rc-sub">'+r.sub+'</div>'+
    '</div>';
  }).join('');

  ov.innerHTML =
    '<div class="ov-card role-card">'+
      '<div class="role-hdr">'+
        '<h2>Bienvenido, '+user.name.split(' ')[0]+'</h2>'+
        '<p>Selecciona tu rol para continuar</p>'+
      '</div>'+
      '<div class="role-grid">'+cards+'</div>'+
      '<div class="role-footer">'+
        '<button class="btn-outline" onclick="closeRoleSelector()">Cancelar</button>'+
        '<button class="btn-cta" id="role-next-btn" disabled onclick="confirmRole()">Continuar →</button>'+
      '</div>'+
    '</div>';

  document.body.appendChild(ov);
  window._selectedRole = null;
}

function selectRole(role){
  window._selectedRole = role;
  document.querySelectorAll('.rc').forEach(function(c){c.classList.remove('sel');});
  var el = document.getElementById('rc-'+role);
  if(el) el.classList.add('sel');
  var btn = document.getElementById('role-next-btn');
  if(btn) btn.disabled = false;
}

function closeRoleSelector(){
  var ov = document.getElementById('role-ov');
  if(ov) ov.remove();
}

function confirmRole(){
  var role = window._selectedRole;
  if(!role) return;
  closeRoleSelector();
  if(role === 'agente'){
    showUserSelector(role);
  } else if(role === 'demo'){
    var demoUser = {name:'Usuario Demo',email:'demo@connect.inc',color:'#8892b0',letter:'D'};
    saveAndRedirect(demoUser, role, null);
  } else {
    showUserSelector(role);
  }
}

/* ── STEP 3: User selector (who exactly) ── */
function showUserSelector(role){
  var ov = document.createElement('div');
  ov.className = 'ov';
  ov.id = 'user-ov';

  var users = USERS[role] || [];
  var items = users.map(function(u){
    return '<div class="user-item" onclick="selectUser(\''+role+'\',\''+u.name+'\')">'+
      '<div class="user-av" style="background:'+u.color+'">'+u.letter+'</div>'+
      '<div>'+
        '<div class="user-name">'+u.name+'</div>'+
        '<div class="user-email">'+u.email+'</div>'+
      '</div>'+
    '</div>';
  }).join('');

  ov.innerHTML =
    '<div class="ov-card user-card">'+
      '<div class="user-hdr">'+
        '<button class="back-btn" onclick="backToRoles()">← Volver</button>'+
        '<h2>Selecciona tu perfil</h2>'+
        '<span class="role-badge">'+ROLE_LABELS[role]+'</span>'+
      '</div>'+
      '<div class="user-list">'+items+'</div>'+
    '</div>';

  document.body.appendChild(ov);
}

function backToRoles(){
  var ov = document.getElementById('user-ov');
  if(ov) ov.remove();
  showRoleSelector(_pendingUser || {name:'Usuario',email:'',color:'#8892b0',letter:'U'});
}

function selectUser(role, userName){
  var users = USERS[role] || [];
  var user = null;
  users.forEach(function(u){if(u.name===userName)user=u;});
  if(!user) return;
  var ov = document.getElementById('user-ov');
  if(ov) ov.remove();
  saveAndRedirect(user, role, null);
}

function connectExtension(){
  var ov = document.getElementById('ext-ov');
  var inp = document.getElementById('ext-inp');
  var err = document.getElementById('ext-err');
  var val = inp ? inp.value.trim() : '';
  if(val.length < 3){
    if(err) err.textContent = 'Ingresa mínimo 3 dígitos';
    if(inp) inp.focus();
    return;
  }
  if(err) err.textContent = '';
  var user = window._extUser || _pendingUser || {};
  var role = window._extRole || 'agente';
  if(ov) ov.remove();
  saveAndRedirect(user, role, val);
}

function skipExtension(){
  var ov = document.getElementById('ext-ov');
  var user = window._extUser || _pendingUser || {};
  var role = window._extRole || 'agente';
  if(ov) ov.remove();
  saveAndRedirect(user, role, null);
}

/* ── FINAL: Save session and redirect ── */
function saveAndRedirect(user, role, extension){
  document.getElementById('loading').classList.add('show');
  setTimeout(function(){
    var session = {
      user:{
        name:user.name,
        email:user.email,
        color:user.color||'#8892b0',
        letter:user.letter||(user.name[0]||'U').toUpperCase(),
        role:role,
        extension:extension
      },
      ts:Date.now()
    };
    localStorage.setItem('helios_session', JSON.stringify(session));
    // Routing por rol: supervisor, admin y formador van directo a reportes
    var _dest = (role==='supervisor'||role==='formador'||role==='admin') ? 'reportes.html' : 'app.html';
    window.location.href = _dest;
  }, 900);
}
